<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour: Titan Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'monospace'; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        .panel {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: rgba(5,5,15,0.98); border: 2px solid #00f2ff; padding: 25px;
            color: #00f2ff; display: none; pointer-events: auto; width: 450px;
            border-radius: 12px; box-shadow: 0 0 60px rgba(0, 242, 255, 0.4); z-index: 1000;
        }
        .gui-btn { background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; color: #00f2ff; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .gui-btn:hover:not(:disabled) { background: #00f2ff; color: #000; }
        .gui-btn:disabled { opacity: 0.2; }
        #admin-console { position: absolute; bottom: 40px; left: 20px; width: 400px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; padding: 10px; pointer-events: auto; display: none; }
        #admin-input { background: transparent; border: none; color: #00f2ff; width: 100%; outline: none; font-size: 16px; }
        #broadcast-msg { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #00f2ff; font-family: 'Orbitron'; font-size: 3rem; opacity: 0; transition: 0.6s; pointer-events: none; text-align: center; font-weight: 900; width: 100%; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="broadcast-msg">SYSTEM ALERT</div>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-tag" class="text-cyan-400 font-bold mb-1 uppercase tracking-widest">SECTOR: 01</div>
                <div class="flex gap-8">
                    <div><span class="text-[10px] block opacity-50">CREDITS</span><span id="coin-count" class="text-2xl font-black text-yellow-400">0</span></div>
                    <div><span class="text-[10px] block opacity-50">PROGRESS</span><span id="dist-tag" class="text-2xl font-black text-white">0/5000m</span></div>
                </div>
            </div>
            <div class="absolute top-6 right-6 flex gap-2">
                <button class="bg-white/10 text-white p-2 text-xs font-bold pointer-events-auto border border-white/20" onclick="updateMenu(); togglePanel('level-menu')">LEVELS</button>
                <button id="master-btn" class="hidden bg-red-600 text-white p-2 text-xs font-bold pointer-events-auto" onclick="togglePanel('admin-gui')">MASTER OVERRIDE</button>
            </div>
        </div>

        <div id="level-menu" class="panel">
            <h2 class="text-center mb-6 font-black text-2xl italic">SECTOR SELECT</h2>
            <div id="level-buttons"></div>
            <button class="text-red-500 text-center w-full mt-4 text-xs font-bold pointer-events-auto" onclick="togglePanel('level-menu')">CLOSE</button>
        </div>

        <div id="admin-gui" class="panel">
            <h2 class="text-center mb-4 text-red-500 font-bold">TITAN ADMIN PANEL</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="gui-btn" onclick="runCmd('/god')">Toggle God</button>
                <button class="gui-btn" onclick="runCmd('/flight')">Toggle Jetpack</button>
                <button class="gui-btn" onclick="runCmd('/unlock')">Unlock All Worlds</button>
                <button class="gui-btn" onclick="runCmd('/size 3')">Giant Mode</button>
                <button class="gui-btn" onclick="runCmd('/size 0.5')">Tiny Mode</button>
                <button class="gui-btn" onclick="runCmd('/lowgrav')">Low Gravity</button>
                <button class="gui-btn" onclick="runCmd('/coins 1t')">1T Credits</button>
                <button class="gui-btn" onclick="runCmd('/lives 999')">999 Lives</button>
            </div>
            <button class="text-white text-center w-full mt-4 text-xs" onclick="togglePanel('admin-gui')">EXIT</button>
        </div>

        <div id="admin-console"><input id="admin-input" type="text" placeholder="Enter Command or Code 101165..."></div>

        <div id="menu" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center pointer-events-auto">
            <h1 class="text-9xl font-black text-white mb-2 hud-text italic tracking-tighter">NEON</h1>
            <h1 class="text-2xl font-bold text-cyan-400 mb-12 tracking-[0.6em] uppercase">Stickman Titan</h1>
            <button class="bg-cyan-500 text-black px-24 py-6 font-black text-3xl hover:bg-white transition-all" onclick="startGame()">RUN</button>
            <p class="text-white/30 mt-8 text-[10px]">SHIFT FOR CONSOLE | GOAL: 5000M</p>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let state = 'MENU', player, platforms = [], obstacles = [], coins = [], powerups = [];
let camera = { x: 0, y: 0 }, keys = {}, gameTick = 0;
let gravityDir = 1, runSpeed = 2, jumpPower = 19, currentGravity = 0.8;

const worldStyles = {
    1: { color: '#00f2ff', name: "Neon District", unlocked: true },
    2: { color: '#ff00ff', name: "Pink Void", unlocked: false },
    3: { color: '#ff4400', name: "Lava Core", unlocked: false },
    4: { color: '#00ff44', name: "Matrix", unlocked: false },
    5: { color: '#ffffff', name: "Hyperlight", unlocked: false }
};
let currentSector = 1;
let progress = { coins: 0, lives: 3, isGod: false, infiniteJet: false, pSize: 1, trailCol: '#00f2ff' };

class Player {
    constructor() { this.reset(); this.trail = []; this.rot = 0; }
    reset(px = 0, py = 400) {
        this.x = px; this.y = py; this.vx = 0; this.vy = 0;
        this.w = 20; this.h = 50; this.grounded = false; this.flipRot = 0;
    }
    update() {
        let move = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += move * runSpeed; this.vx *= 0.85;

        if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
            if (this.grounded && !keys.jumpPressed) {
                this.vy = -jumpPower * gravityDir;
                this.grounded = false; keys.jumpPressed = true;
                this.flipRot = 0; // Reset flip
            } else if (progress.infiniteJet) { this.vy -= 1.4 * gravityDir; }
        }

        if (!this.grounded) {
            this.flipRot += 0.22; // 360 Flip speed
            if (this.flipRot > Math.PI * 2) this.flipRot = Math.PI * 2;
        } else { this.flipRot = 0; }

        this.vy += currentGravity * gravityDir;
        this.x += this.vx; this.y += this.vy;

        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + (this.w*progress.pSize) > p.x && this.x < p.x + p.w) {
                if (gravityDir === 1 && this.vy >= 0 && this.y + (this.h*progress.pSize) >= p.y && this.y + (this.h*progress.pSize) <= p.y + 30) {
                    this.y = p.y - (this.h*progress.pSize); this.vy = 0; this.grounded = true;
                }
            }
        });

        if (this.x >= 5000) {
            if (currentSector < 5) {
                worldStyles[currentSector+1].unlocked = true;
                broadcast("SECTOR COMPLETE! UNLOCKED " + worldStyles[currentSector+1].name);
                loadWorld(currentSector+1);
            } else { broadcast("ASCENDED: ALL LEVELS COMPLETE"); }
        }

        if (!progress.isGod) {
            obstacles.forEach(o => { if (this.x < o.x + o.w && this.x + 20 > o.x && this.y < o.y + o.h && this.y + 50 > o.y) die(); });
            if (this.y > 3000) die();
        }

        this.trail.push({x: this.x + 10, y: this.y + 25});
        if (this.trail.length > 15) this.trail.shift();

        document.getElementById('coin-count').innerText = progress.coins.toLocaleString();
        document.getElementById('dist-tag').innerText = Math.floor(this.x) + "/5000m";
    }

    draw() {
        // Trail
        this.trail.forEach((t, i) => {
            ctx.globalAlpha = i / 15;
            ctx.fillStyle = progress.trailCol;
            ctx.fillRect(t.x - camera.x - 5, t.y - camera.y - 5, 10, 10);
        });
        
        ctx.globalAlpha = 1; ctx.save();
        ctx.translate(this.x + 10 - camera.x, this.y + 25 - camera.y);
        ctx.scale(progress.pSize, progress.pSize);
        ctx.rotate(this.flipRot);
        
        // Stickman Drawing
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.beginPath();
        ctx.arc(0, -15, 6, 0, Math.PI*2); // Head
        ctx.moveTo(0, -9); ctx.lineTo(0, 10); // Torso
        ctx.moveTo(0, 0); ctx.lineTo(-12, 10); // Left Arm
        ctx.moveTo(0, 0); ctx.lineTo(12, 10); // Right Arm
        ctx.moveTo(0, 10); ctx.lineTo(-8, 25); // Left Leg
        ctx.moveTo(0, 10); ctx.lineTo(8, 25); // Right Leg
        ctx.stroke(); ctx.restore();
    }
}

function die() { player.reset(0, 400); broadcast("RECONSTRUCTING..."); }

function broadcast(msg) {
    const b = document.getElementById('broadcast-msg');
    b.innerText = msg; b.style.opacity = 1;
    setTimeout(() => b.style.opacity = 0, 3000);
}

function updateMenu() {
    const container = document.getElementById('level-buttons');
    container.innerHTML = '';
    Object.keys(worldStyles).forEach(id => {
        const btn = document.createElement('button');
        btn.className = 'gui-btn';
        btn.innerText = worldStyles[id].name + (worldStyles[id].unlocked ? "" : " [LOCKED]");
        btn.disabled = !worldStyles[id].unlocked;
        btn.onclick = () => { loadWorld(parseInt(id)); togglePanel('level-menu', true); };
        container.appendChild(btn);
    });
}

function loadWorld(id) {
    currentSector = id;
    document.getElementById('world-tag').innerText = "SECTOR: " + worldStyles[id].name;
    platforms = [{ x: 0, y: 500, w: 10000, h: 60 }];
    obstacles = []; coins = []; gameTick = 0;
    let lx = 1000;
    for (let i = 0; i < 400; i++) {
        let gap = 150 + Math.random() * 250;
        let pw = 300 + Math.random() * 600;
        let ny = 250 + Math.random() * 450;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        if (i % 4 === 0) obstacles.push({ x: lx + gap + 200, y: ny - 70, w: 60, h: 60 });
        lx += gap + pw;
    }
    player.x = 0;
}

function runCmd(cmd) {
    const p = cmd.split(' ');
    if (p[0] === '101165') document.getElementById('master-btn').classList.remove('hidden');
    if (p[0] === '/god') progress.isGod = !progress.isGod;
    if (p[0] === '/flight') progress.infiniteJet = !progress.infiniteJet;
    if (p[0] === '/unlock') { Object.keys(worldStyles).forEach(k => worldStyles[k].unlocked = true); broadcast("ALL SECTORS ACCESSIBLE"); }
    if (p[0] === '/size') progress.pSize = parseFloat(p[1]);
    if (p[0] === '/lowgrav') currentGravity = 0.2;
    if (p[0] === '/coins') progress.coins = p[1] === '1t' ? 1000000000000 : parseInt(p[1]);
    if (p[0] === '/trail') progress.trailCol = p[1];
    if (p[0] === '/say') broadcast(cmd.substring(5).toUpperCase());
}

function togglePanel(id, forceClose = false) {
    const el = document.getElementById(id);
    el.style.display = (forceClose || el.style.display === 'block') ? 'none' : 'block';
}

function startGame() {
    player = new Player(); state = 'PLAY'; loadWorld(1);
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

function loop() {
    ctx.fillStyle = "#020205"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
        
        platforms.forEach(p => {
            if (p.x > camera.x - 1000 && p.x < camera.x + canvas.width + 1000) {
                ctx.fillStyle = worldStyles[currentSector].color; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 8);
            }
        });

        obstacles.forEach(o => {
            ctx.fillStyle = "#ff0044"; 
            ctx.save(); ctx.translate(o.x + 30 - camera.x, o.y + 30 - camera.y);
            ctx.rotate(gameTick * 0.1); ctx.fillRect(-30, -5, 60, 10); ctx.restore();
        });

        // The End Portal
        ctx.fillStyle = "#ffd700"; ctx.shadowBlur = 40; ctx.shadowColor = "#ffd700";
        ctx.fillRect(5000 - camera.x, 0, 100, canvas.height); ctx.shadowBlur = 0;

        player.draw();
    }
    gameTick++; requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if (e.key === 'Shift') {
        const c = document.getElementById('admin-console');
        c.style.display = c.style.display === 'block' ? 'none' : 'block';
        if(c.style.display === 'block') document.getElementById('admin-input').focus();
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; if (['KeyW', 'Space', 'ArrowUp'].includes(e.code)) keys.jumpPressed = false; });
document.getElementById('admin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { runCmd(e.target.value); e.target.value = ''; document.getElementById('admin-console').style.display = 'none'; }
});
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
