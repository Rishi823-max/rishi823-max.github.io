<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour Pro | Admin Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        .btn { background: #00f2ff; color: #000; padding: 12px 30px; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border: none; transition: 0.2s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px #00f2ff; }
        .hidden { display: none !important; }
        
        #admin-console {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 450px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff;
            padding: 10px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-name" class="text-xs text-cyan-400 font-bold uppercase">WORLD 1</div>
                <div class="flex items-end gap-4">
                    <div><div class="text-[10px] opacity-50">LEVEL</div><div id="lvl-num" class="text-3xl font-black">1</div></div>
                    <div><div class="text-[10px] opacity-50">DISTANCE</div><div id="dist" class="text-3xl font-black">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
                <div id="admin-status" class="text-[10px] text-cyan-400 font-bold mt-2"></div>
            </div>
        </div>

        <div id="admin-console">
            <div class="text-[10px] opacity-50 mb-1">TERMINAL ACCESS [CODE: 1056914]</div>
            <input type="text" id="admin-input" placeholder="Enter Command..." autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-6xl font-black text-white mb-2 italic hud-text">PARKOUR PRO</h1>
            <button class="btn" onclick="startGame()">START RUN</button>
            <p class="text-[10px] text-white/30 mt-4 uppercase">W to Jump • S to Slide • ` to Hack</p>
        </div>

        <div id="death-screen" class="menu-overlay hidden">
            <h2 class="text-5xl font-black text-red-500 hud-text">CRASHED</h2>
            <button class="btn !bg-red-500 !text-white" onclick="location.reload()">RETRY</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminConsole = document.getElementById('admin-console');
const adminInput = document.getElementById('admin-input');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [];
let camera = { x: 0, y: 0 };
let keys = {};
let startX = 0;
let isAdminUnlocked = false;

let progress = { 
    coins: 0, 
    hasJetpack: false, 
    isGod: false,
    doubleJump: false,
    currentLevel: 1
};

class Player {
    constructor() {
        this.reset();
        this.jumpCount = 0;
    }
    reset() {
        this.x = 100;
        this.y = 400;
        this.vx = 0;
        this.vy = 0;
        this.w = 20;
        this.h = 46;
        this.grounded = false;
        this.sliding = false;
        this.rot = 0;
        this.trail = [];
        startX = this.x; 
    }

    update() {
        let moveX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += moveX * (this.grounded ? 0.8 : 0.4);
        this.vx *= 0.88;
        
        // Jump Logic
        if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
            if (this.grounded && !keys.jumpPressed) {
                this.vy = -14;
                this.grounded = false;
                this.jumpCount = 1;
                keys.jumpPressed = true;
            } else if (progress.doubleJump && this.jumpCount < 2 && !keys.jumpPressed) {
                this.vy = -12;
                this.jumpCount = 2;
                keys.jumpPressed = true;
            }
        }

        // Gravity / Fly
        if (progress.hasJetpack && (keys['KeyW'] || keys['Space'] || keys['ArrowUp'])) {
            this.vy -= 0.8;
            this.rot += 0.25;
        } else {
            this.vy += 0.6;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Visuals
        if (!this.grounded) this.rot += this.vx * 0.15; else this.rot = 0;
        
        // Slide
        if ((keys['KeyS'] || keys['ArrowDown']) && this.grounded) {
            if (!this.sliding) { this.sliding = true; this.h = 16; this.y += 30; }
        } else if (this.sliding) {
            this.h = 46; this.y -= 30; this.sliding = false;
        }

        // Collisions
        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.vy > 0 && this.y + this.h > p.y && this.y + this.h < p.y + 15) {
                this.y = p.y - this.h;
                this.vy = 0;
                this.grounded = true;
                this.jumpCount = 0;
            }
        });

        if (!progress.isGod) {
            obstacles.forEach(o => {
                if (this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y) die();
            });
            if (this.y > 1500) die();
        }

        this.trail.push({x: this.x + this.w/2, y: this.y + this.h/2});
        if (this.trail.length > 12) this.trail.shift();

        coins.forEach(c => {
            if (!c.collected && this.x < c.x + 15 && this.x + this.w > c.x && this.y < c.y + 15 && this.y + this.h > c.y) {
                c.collected = true; progress.coins += 10;
            }
        });

        document.getElementById('dist').innerText = Math.max(0, Math.floor((this.x - 100) / 10)) + "m";
    }

    draw() {
        if (this.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = "red"; ctx.lineWidth = 3;
            this.trail.forEach(t => ctx.lineTo(t.x - camera.x, t.y - camera.y));
            ctx.stroke();
        }
        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = progress.isGod ? "#00f2ff" : "#fff";
        if (this.sliding) {
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        } else {
            ctx.beginPath(); ctx.arc(0, -18, 6, 0, Math.PI*2); ctx.fill(); // Head
            ctx.fillRect(-2, -12, 4, 16); // Body
            ctx.fillRect(-8, -10, 16, 3); // Arms
            ctx.fillRect(-6, 4, 4, 12); ctx.fillRect(2, 4, 4, 12); // Legs
        }
        ctx.restore();
    }
}

function adminCommand(input) {
    const args = input.trim().split(' ');
    const cmd = args[0].toLowerCase();
    
    if (!isAdminUnlocked) {
        if (input === "1056914") {
            isAdminUnlocked = true;
            document.getElementById('admin-status').innerText = "ACCESS: ADMIN PRIVILEGES ACTIVE";
        }
    } else {
        if (cmd === "/god") { progress.isGod = !progress.isGod; document.getElementById('admin-status').innerText = "GOD MODE: " + progress.isGod; }
        if (cmd === "/fly") { progress.hasJetpack = !progress.hasJetpack; document.getElementById('admin-status').innerText = "FLY MODE: " + progress.hasJetpack; }
        if (cmd === "/double" && args[1] === "jump") { progress.doubleJump = !progress.doubleJump; document.getElementById('admin-status').innerText = "DOUBLE JUMP: " + progress.doubleJump; }
        if (cmd === "/skip" && args[1] === "level") { progress.currentLevel++; startGame(); document.getElementById('admin-status').innerText = "LEVEL SKIPPED TO: " + progress.currentLevel; }
        if (cmd === "/give" && args[1] === "coins") {
            const val = parseInt(args[2]) || 0;
            progress.coins += val;
            document.getElementById('admin-status').innerText = "GRANTED " + val + " COINS";
        }
    }
    adminConsole.style.display = "none";
    adminInput.value = "";
}

function generateLevel() {
    platforms = [{ x: 0, y: 500, w: 800, h: 50 }];
    obstacles = []; coins = [];
    let lx = 800;
    for (let i = 0; i < 40; i++) {
        let gap = 160 + Math.random() * 260;
        let pw = 200 + Math.random() * 400;
        let ny = 300 + Math.random() * 450;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        if (i % 4 === 0) obstacles.push({ x: lx + gap + 100, y: ny - 300, w: 12, h: 300 });
        if (Math.random() > 0.45) coins.push({ x: lx + gap + 50, y: ny - 60, collected: false });
        lx += gap + pw;
    }
}

function startGame() {
    generateLevel();
    if (!player) player = new Player();
    player.reset();
    state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('lvl-num').innerText = progress.currentLevel;
}

function die() { state = 'DEATH'; document.getElementById('death-screen').classList.remove('hidden'); }

function loop() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
        platforms.forEach(p => {
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 10);
            ctx.fillStyle = "#111"; ctx.fillRect(p.x - camera.x, p.y + 10 - camera.y, p.w, p.h);
        });
        obstacles.forEach(o => { ctx.fillStyle = "red"; ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h); });
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "yellow"; ctx.fillRect(c.x - camera.x, c.y - camera.y, 14, 14); } });
        player.draw();
        document.getElementById('coin-count').innerText = progress.coins;
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key === '`') {
        adminConsole.style.display = "block";
        adminInput.focus();
    }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') keys.jumpPressed = false;
});
adminInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminCommand(adminInput.value); });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
