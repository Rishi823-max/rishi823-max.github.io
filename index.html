<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        
        /* Admin GUI Sidebar */
        #admin-gui {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; padding: 15px;
            color: #00f2ff; display: none; pointer-events: auto; width: 180px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); border-radius: 8px;
        }
        .gui-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 10px; border-bottom: 1px solid rgba(0,242,255,0.1); padding-bottom: 4px; }
        .status-on { color: #00ff00; font-weight: bold; }
        .status-off { color: #ff0044; }

        #admin-console {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff;
            padding: 10px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
        .btn { background: #00f2ff; color: #000; padding: 10px 25px; cursor: pointer; font-weight: 900; border: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div class="flex items-end gap-6">
                    <div><div class="text-[10px] opacity-50">DIST</div><div id="dist" class="text-3xl font-black text-white">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
            </div>
        </div>

        <div id="admin-gui">
            <div class="text-xs font-black mb-4 border-b border-cyan-400 pb-2">ADMIN PANEL v1.2</div>
            <div class="gui-row"><span>GOD MODE</span><span id="gui-god" class="status-off">OFF</span></div>
            <div class="gui-row"><span>FLIGHT</span><span id="gui-fly" class="status-off">OFF</span></div>
            <div class="gui-row"><span>DBL JUMP</span><span id="gui-jump" class="status-off">OFF</span></div>
            <div class="text-[8px] opacity-50 mt-4 text-center">CMD: /GOD, /FLY, /DOUBLE JUMP</div>
        </div>

        <div id="admin-console">
            <div class="text-[8px] opacity-50 mb-1 tracking-widest">SYSTEM_TERMINAL_ENCRYPTED</div>
            <input type="text" id="admin-input" placeholder="Enter Authentication..." autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-6xl font-black text-white mb-4 italic hud-text">NEON RUNNER</h1>
            <button class="btn" onclick="startGame()">START</button>
            <p class="text-[10px] text-white/30 mt-6 tracking-widest uppercase">W: Jump | S: Slide | Shift: Hack</p>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminConsole = document.getElementById('admin-console');
const adminInput = document.getElementById('admin-input');
const adminGui = document.getElementById('admin-gui');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [];
let camera = { x: 0, y: 0 };
let keys = {};
let isAdminUnlocked = false;

let progress = { coins: 0, hasJetpack: false, isGod: false, doubleJump: false, currentLevel: 1 };

class Player {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = 100; this.y = 400; this.vx = 0; this.vy = 0;
        this.w = 20; this.h = 46; this.grounded = false;
        this.sliding = false; this.rot = 0; this.jumpCount = 0;
    }

    update() {
        let moveX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += moveX * (this.grounded ? 1.0 : 0.6);
        this.vx *= 0.88;
        
        if ((keys['KeyW'] || keys['Space'] || keys['ArrowUp'])) {
            if (this.grounded && !keys.jumpPressed) {
                this.vy = -14; this.grounded = false; this.jumpCount = 1; keys.jumpPressed = true;
            } else if (progress.doubleJump && this.jumpCount < 2 && !keys.jumpPressed) {
                this.vy = -12; this.jumpCount = 2; keys.jumpPressed = true;
            }
        }

        if (progress.hasJetpack && (keys['KeyW'] || keys['Space'])) { this.vy -= 0.85; this.rot += 0.3; } 
        else { this.vy += 0.65; }

        this.x += this.vx; this.y += this.vy;
        if (!this.grounded) this.rot += this.vx * 0.15; else this.rot = 0;
        
        // SLIDE LOGIC
        if ((keys['KeyS'] || keys['ArrowDown'])) {
            if (!this.sliding) { this.sliding = true; this.h = 20; this.y += 26; }
        } else if (this.sliding) {
            this.h = 46; this.y -= 26; this.sliding = false;
        }

        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.vy > 0 && this.y + this.h > p.y && this.y + this.h < p.y + 15) {
                this.y = p.y - this.h; this.vy = 0; this.grounded = true; this.jumpCount = 0;
            }
        });

        if (!progress.isGod) {
            obstacles.forEach(o => {
                if (this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y) die();
            });
            if (this.y > 1500) die();
        }

        coins.forEach(c => {
            if (!c.collected && this.x < c.x + 15 && this.x + this.w > c.x && this.y < c.y + 15 && this.y + this.h > c.y) {
                c.collected = true; progress.coins += 10;
            }
        });

        document.getElementById('dist').innerText = Math.max(0, Math.floor((this.x - 100) / 10)) + "m";
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = progress.isGod ? "#00f2ff" : "#fff";
        if (this.sliding) {
            ctx.fillRect(-15, -10, 30, 20); // Wider slide body
        } else {
            ctx.beginPath(); ctx.arc(0, -18, 6, 0, Math.PI*2); ctx.fill(); 
            ctx.fillRect(-2, -12, 4, 16); ctx.fillRect(-8, -10, 16, 3); 
            ctx.fillRect(-6, 4, 4, 12); ctx.fillRect(2, 4, 4, 12); 
        }
        ctx.restore();
    }
}

function updateGui() {
    document.getElementById('gui-god').innerText = progress.isGod ? "ON" : "OFF";
    document.getElementById('gui-god').className = progress.isGod ? "status-on" : "status-off";
    document.getElementById('gui-fly').innerText = progress.hasJetpack ? "ON" : "OFF";
    document.getElementById('gui-fly').className = progress.hasJetpack ? "status-on" : "status-off";
    document.getElementById('gui-jump').innerText = progress.doubleJump ? "ON" : "OFF";
    document.getElementById('gui-jump').className = progress.doubleJump ? "status-on" : "status-off";
}

function adminCommand(input) {
    const args = input.trim().split(' ');
    const cmd = args[0].toLowerCase();
    
    if (!isAdminUnlocked) {
        if (input === "101165") { isAdminUnlocked = true; adminGui.style.display = "block"; }
    } else {
        if (cmd === "/god") progress.isGod = !progress.isGod;
        if (cmd === "/fly") progress.hasJetpack = !progress.hasJetpack;
        if (cmd === "/double" && args[1] === "jump") progress.doubleJump = !progress.doubleJump;
        if (cmd === "/skip" && args[1] === "level") startGame();
        if (cmd === "/give" && args[1] === "coins") progress.coins += parseInt(args[2]) || 0;
        updateGui();
    }
    adminConsole.style.display = "none"; adminInput.value = "";
}

function generateLevel() {
    platforms = [{ x: 0, y: 500, w: 800, h: 50 }];
    obstacles = []; coins = [];
    let lx = 800;
    for (let i = 0; i < 60; i++) {
        let gap = 90 + Math.random() * 130;
        let pw = 150 + Math.random() * 250;
        let ny = 380 + Math.random() * 300;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        
        // Randomly place a Slide Laser or a Jump Pillar
        if (i % 3 === 0) {
            if (Math.random() > 0.5) {
                // SLIDE LASER (Floating beam)
                obstacles.push({ x: lx + gap + 40, y: ny - 70, w: pw - 80, h: 8 }); 
            } else {
                // JUMP PILLAR
                obstacles.push({ x: lx + gap + 60, y: ny - 300, w: 12, h: 300 });
            }
        }
        if (Math.random() > 0.4) coins.push({ x: lx + gap + 20, y: ny - 60, collected: false });
        lx += gap + pw;
    }
}

function startGame() {
    generateLevel();
    if (!player) player = new Player();
    player.reset(); state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

function die() { state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); }

function loop() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.12;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.12;
        platforms.forEach(p => {
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 6);
            ctx.fillStyle = "#111"; ctx.fillRect(p.x - camera.x, p.y + 6 - camera.y, p.w, p.h);
        });
        obstacles.forEach(o => {
            ctx.fillStyle = "#ff0044"; 
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0044";
            ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h);
            ctx.shadowBlur = 0;
        });
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.fillRect(c.x - camera.x, c.y - camera.y, 12, 12); } });
        player.draw();
        document.getElementById('coin-count').innerText = progress.coins;
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key === 'Shift') { adminConsole.style.display = "block"; adminInput.focus(); }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') keys.jumpPressed = false;
});
adminInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminCommand(adminInput.value); });

canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
