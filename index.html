<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour Pro | Admin Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        .btn { background: #00f2ff; color: #000; padding: 12px 30px; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border: none; margin-top: 10px; }
        .hidden { display: none !important; }
        
        /* Admin Console */
        #admin-console {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff;
            padding: 10px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-name" class="text-xs text-cyan-400 font-bold uppercase">WORLD 1</div>
                <div class="flex items-end gap-4">
                    <div><div class="text-[10px] opacity-50">LEVEL</div><div id="lvl-num" class="text-3xl font-black">1</div></div>
                    <div><div class="text-[10px] opacity-50">DISTANCE</div><div id="dist" class="text-3xl font-black">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
                <div id="admin-status" class="text-[10px] text-red-500 font-bold mt-2"></div>
            </div>
        </div>

        <div id="admin-console">
            <div class="text-[10px] opacity-50 mb-1">TERMINAL ACCESS (CODE REQUIRED)</div>
            <input type="text" id="admin-input" placeholder="Enter Command..." autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-6xl font-black text-white mb-2 italic hud-text">PARKOUR PRO</h1>
            <button class="btn" onclick="startGameFromParams(progress.lastWorld, progress.lastLevel)">Start Game</button>
            <p class="text-[10px] text-white/30 mt-4">PRESS [~] FOR CONSOLE</p>
        </div>

        <div id="death-screen" class="menu-overlay hidden">
            <h2 class="text-5xl font-black text-red-500 hud-text">CRASHED</h2>
            <button class="btn !bg-red-500" onclick="location.reload()">Respawn</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminConsole = document.getElementById('admin-console');
const adminInput = document.getElementById('admin-input');
const adminStatus = document.getElementById('admin-status');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [];
let camera = { x: 0, y: 0 };
let keys = {};
let startX = 0;
let isAdmin = false;

let progress = { 
    highestLevel: 1, lastWorld: 0, lastLevel: 1, 
    lastCheckpoint: { x: 100, y: 500 }, coins: 0, 
    hasJetpack: false, isGod: false 
};

// Player Class with Human Sprite
class Player {
    constructor() {
        this.reset();
        this.fuel = 100;
        this.rot = 0;
    }
    reset() {
        this.x = progress.lastCheckpoint.x; 
        this.y = progress.lastCheckpoint.y - 60;
        this.vx = 0; this.vy = 0;
        this.w = 20; this.h = 45;
        this.grounded = false;
        this.sliding = false;
        this.trail = [];
    }

    update() {
        this.trail.push({x: this.x + this.w/2, y: this.y + this.h/2});
        if (this.trail.length > 15) this.trail.shift();

        let inputX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += inputX * (this.grounded ? 0.8 : 0.5);
        this.vx *= 0.88;

        // Gravity vs Jetpack
        if (progress.hasJetpack && (keys['KeyW'] || keys['ArrowUp'] || keys['Space'])) {
            this.vy -= 1.0;
        } else {
            this.vy += 0.55;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Rotation Animation (Flip when in air)
        if (!this.grounded) {
            this.rot += this.vx * 0.1;
        } else {
            this.rot = 0;
        }

        // Sliding
        if ((keys['KeyS'] || keys['ArrowDown']) && this.grounded) {
            if (!this.sliding) { this.sliding = true; this.h = 15; this.y += 30; }
        } else if (this.sliding) {
            this.h = 45; this.y -= 30; this.sliding = false;
        }

        // Collision: Platforms
        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.vy > 0 && this.y + this.h > p.y && this.y + this.h < p.y + 10) {
                this.y = p.y - this.h; this.vy = 0; this.grounded = true;
            }
        });

        // Collision: Hazard (Check God Mode)
        if (!progress.isGod) {
            obstacles.forEach(o => {
                if (this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y) die();
            });
            if (this.y > 2000) die();
        }

        // Coins
        coins.forEach(c => {
            if (!c.collected && this.x < c.x + 15 && this.x + this.w > c.x && this.y < c.y + 15 && this.y + this.h > c.y) {
                c.collected = true; progress.coins += 10;
            }
        });

        document.getElementById('dist').innerText = Math.max(0, Math.floor((this.x - startX) / 10)) + "m";
    }

    draw() {
        // Trail
        if (this.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = 'red'; ctx.lineWidth = 2;
            this.trail.forEach(t => ctx.lineTo(t.x - camera.x, t.y - camera.y));
            ctx.stroke();
        }

        // Draw Human
        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = progress.isGod ? "#00f2ff" : "#fff";
        
        if (this.sliding) {
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        } else {
            // Head
            ctx.beginPath(); ctx.arc(0, -18, 5, 0, Math.PI*2); ctx.fill();
            // Torso
            ctx.fillRect(-2, -12, 4, 15);
            // Arms
            ctx.fillRect(-8, -10, 16, 2);
            // Legs
            ctx.fillRect(-5, 3, 3, 10); ctx.fillRect(2, 3, 3, 10);
        }
        ctx.restore();
    }
}

// Admin Commands
adminInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = adminInput.value;
        const [cmd, arg] = val.split(' ');

        if (!isAdmin) {
            if (val === "1056914") { isAdmin = true; adminStatus.innerText = "ADMIN ACCESS GRANTED"; }
        } else {
            if (cmd === "/god") { progress.isGod = !progress.isGod; adminStatus.innerText = "GOD MODE: " + progress.isGod; }
            if (cmd === "/fly") { progress.hasJetpack = !progress.hasJetpack; adminStatus.innerText = "JETPACK: " + progress.hasJetpack; }
            if (cmd === "/give" && arg === "coins") { 
                const amt = parseInt(val.split(' ')[2]) || 0;
                progress.coins += amt;
                adminStatus.innerText = "ADDED " + amt + " COINS";
            }
        }
        adminInput.value = "";
        adminConsole.style.display = "none";
    }
});

function generateLevel() {
    platforms = [{ x: 0, y: 500, w: 800, h: 50 }];
    startX = 100;
    let lx = 800, ly = 500;
    for (let i = 0; i < 50; i++) {
        let gap = 200 + Math.random() * 200;
        let pw = 200 + Math.random() * 300;
        let ny = Math.max(200, Math.min(800, ly + (Math.random()-0.5)*300));
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        if (i % 2 === 0) obstacles.push({ x: lx + gap + pw/2, y: ny - 350, w: 14, h: 334 });
        if (Math.random() > 0.5) coins.push({ x: lx + gap + 50, y: ny - 60, collected: false });
        lx += gap + pw; ly = ny;
    }
}

function startGameFromParams() {
    generateLevel();
    player = new Player();
    state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

function die() { state = 'DEATH'; document.getElementById('death-screen').classList.remove('hidden'); }

function loop() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
        
        platforms.forEach(p => {
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 10);
            ctx.fillStyle = "#111"; ctx.fillRect(p.x - camera.x, p.y + 10 - camera.y, p.w, p.h);
        });
        obstacles.forEach(o => {
            ctx.fillStyle = "red"; ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h);
        });
        coins.forEach(c => {
            if (!c.collected) { ctx.fillStyle = "yellow"; ctx.fillRect(c.x - camera.x, c.y - camera.y, 15, 15); }
        });
        player.draw();
        document.getElementById('coin-count').innerText = progress.coins;
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.key === '`' || e.key === 'Enter' && state === 'PLAY') {
        adminConsole.style.display = "block";
        adminInput.focus();
    }
});
window.addEventListener('keyup', (e) => keys[e.code] = false);
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
