<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Drift Pro </title>
    <style>
        body { margin: 0; background: #010103; overflow: hidden; font-family: 'Courier New', monospace; color: #0ffa; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 1rem; left: 1rem; pointer-events: none; z-index: 5; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .cr { color: #ff2a6d; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="ui"></div>
    <canvas id="stage"></canvas>

<script>
/** * BUILD_ID: 0x774AC
 * ENCRYPTION: LOCAL_STORAGE_IV
 */
(function() {
    const _0x = document.getElementById('stage'), $ = _0x.getContext('2d'), ui = document.getElementById('ui');
    let w, h, cx, cy, s = 0, hs = localStorage.getItem('_nd_hs') || 0, sh = 0, gl = 0;
    let pt = [], ob = [], active = !0, fr = 0;
    let p = { a: 0, d: 150, r: 5, s: 0.048, td: 150 };

    const res = () => { w = _0x.width = innerWidth; h = _0x.height = innerHeight; cx = w/2; cy = h/2; };
    window.onresize = res; res();

    let hld = !1;
    const inp = (v) => hld = v;
    window.onmousedown = () => inp(!0); window.onmouseup = () => inp(!1);
    window.ontouchstart = (e) => { inp(!0); e.preventDefault(); }; window.ontouchend = () => inp(!1);

    const updateUI = () => {
        ui.innerHTML = `LOAD: ${Math.floor(s)}%<br>BEST: ${Math.floor(hs)}%<br>STATUS: <span class="${gl>0?'cr':''}">${gl>0?'!! ERROR !!':'NOMINAL'}</span>`;
    };

    class Particle {
        constructor(x, y, c) { this.x = x; this.y = y; this.v = {x:(Math.random()-.5)*15, y:(Math.random()-.5)*15}; this.l = 1; this.c = c; }
        draw() { this.x += this.v.x; this.y += this.v.y; this.l -= 0.03; $.globalAlpha = this.l; $.fillStyle = this.c; $.fillRect(this.x, this.y, 2, 2); }
    }

    const loop = () => {
        if (!active) return;
        fr++;
        if (s > hs) { hs = s; localStorage.setItem('_nd_hs', hs); }
        if (Math.floor(s) % 50 === 0 && Math.floor(s) !== 0 && gl === 0) { gl = 20; sh = 15; }

        $.save();
        if (sh > 0) { $.translate((Math.random()-.5)*sh, (Math.random()-.5)*sh); sh *= 0.9; }

        p.td = hld ? 85 : 215;
        p.d += (p.td - p.d) * 0.2;
        p.a += p.s;

        const px = cx + Math.cos(p.a) * p.d, py = cy + Math.sin(p.a) * p.d;

        $.fillStyle = `rgba(1, 1, 3, ${gl > 0 ? 0.4 : 0.2})`;
        $.fillRect(-100, -100, w+200, h+200);

        $.strokeStyle = gl > 0 ? '#ff2a6d' : 'rgba(15, 255, 161, 0.1)';
        [85, 215].forEach(r => { $.beginPath(); $.arc(cx, cy, r, 0, Math.PI*2); $.stroke(); });

        ob.forEach((o, i) => {
            o.a -= o.v;
            const ox = cx + Math.cos(o.a) * o.d, oy = cy + Math.sin(o.a) * o.d;
            $.fillStyle = '#ff2a6d';
            $.shadowBlur = gl > 0 ? 20 : 10; $.shadowColor = '#ff2a6d';
            $.beginPath(); $.arc(ox, oy, o.r, 0, Math.PI*2); $.fill();

            if (Math.hypot(px-ox, py-oy) < p.r + o.r) {
                sh = 30; for(let k=0; k<50; k++) pt.push(new Particle(px, py, '#0ffa1a'));
                active = !1; setTimeout(() => location.reload(), 1000);
            }
        });

        $.fillStyle = '#0ffa1a';
        $.shadowBlur = 15; $.shadowColor = '#0ffa1a';
        $.beginPath(); $.arc(px, py, p.r, 0, Math.PI*2); $.fill();
        $.shadowBlur = 0;

        pt.forEach((p, i) => { p.draw(); if(p.l <= 0) pt.splice(i, 1); });
        $.globalAlpha = 1; $.restore();

        if (gl > 0) {
            $.fillStyle = "rgba(255, 42, 109, 0.1)";
            $.fillRect(0, Math.random()*h, w, 5);
            gl--;
        }

        s += 0.08;
        if (fr % 10 === 0) updateUI();
        if (Math.random() < 0.05 + (s/5000)) ob.push({ a: Math.random()*Math.PI*2, d: Math.random()>0.5?85:215, r: 8+Math.random()*12, v: 0.03 + (s*0.0001) });
        if (ob.length > 30) ob.shift();
        
        requestAnimationFrame(loop);
    };
    loop();
})();
</script>
</body>
</html>
