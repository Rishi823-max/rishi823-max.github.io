<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour | Solid Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        
        /* Admin Button - Appears after unlock */
        #admin-toggle-btn {
            position: absolute; right: 20px; top: 20px;
            background: #00f2ff; color: #000; padding: 10px;
            font-weight: 900; border-radius: 5px; cursor: pointer;
            pointer-events: auto; display: none; box-shadow: 0 0 15px #00f2ff;
        }

        #admin-gui {
            position: absolute; right: 20px; top: 80px;
            background: rgba(0,0,0,0.95); border: 2px solid #00f2ff; padding: 15px;
            color: #00f2ff; display: none; pointer-events: auto; width: 220px;
            border-radius: 12px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }
        .gui-btn {
            background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff;
            color: #00f2ff; width: 100%; padding: 8px; margin-bottom: 8px;
            cursor: pointer; font-size: 10px; font-weight: bold; transition: 0.2s;
        }
        .gui-btn:hover { background: #00f2ff; color: #000; }
        .active { background: #00ff00 !important; color: #000 !important; border-color: #00ff00 !important; }

        #admin-console {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 400px; background: #0a0a0a; border: 2px solid #00f2ff;
            padding: 15px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; }
        
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .btn-main { background: #00f2ff; color: #000; padding: 15px 40px; cursor: pointer; font-weight: 900; border: none; border-radius: 4px; pointer-events: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-tag" class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold mb-1 uppercase">Initializing...</div>
                <div class="flex items-end gap-8">
                    <div><div class="text-[10px] opacity-50">DIST</div><div id="dist" class="text-3xl font-black">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
            </div>
            <div id="admin-toggle-btn" onclick="toggleGui()">ADMIN MENU</div>
        </div>

        <div id="admin-gui">
            <div class="text-xs font-black mb-4 border-b border-cyan-400 pb-2 text-center">ELITE OVERRIDE</div>
            <button id="btn-god" class="gui-btn" onclick="runCmd('/god')">TOGGLE GOD MODE</button>
            <button id="btn-fly" class="gui-btn" onclick="runCmd('/fly')">TOGGLE FLIGHT</button>
            <button id="btn-jump" class="gui-btn" onclick="runCmd('/double jump')">TOGGLE D-JUMP</button>
            <button class="gui-btn" onclick="runCmd('/give coins 5000')">GIVE 5000 COINS</button>
            <button class="gui-btn" onclick="runCmd('/skip level')">NEXT WORLD</button>
        </div>

        <div id="admin-console">
            <div class="text-[10px] opacity-50 mb-1 italic">Enter Secret Key...</div>
            <input type="text" id="admin-input" autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-7xl font-black text-white mb-2 italic hud-text tracking-tighter">NEON ELITE</h1>
            <button class="btn-main" onclick="startGame()">START RUN</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminConsole = document.getElementById('admin-console');
const adminInput = document.getElementById('admin-input');
const adminGui = document.getElementById('admin-gui');
const adminToggleBtn = document.getElementById('admin-toggle-btn');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [];
let camera = { x: 0, y: 0 };
let keys = {};
let isAdminUnlocked = false;

const worlds = [
    { name: "NEON CITY", color: "#00f2ff", bg: "#050505" },
    { name: "CYBER VOID", color: "#ff00ff", bg: "#0a000a" }
];

let progress = { coins: 0, hasJetpack: false, isGod: false, doubleJump: false, worldIndex: 0 };

class Player {
    constructor() { this.reset(); }
    reset() {
        this.x = 100; this.y = 400; this.vx = 0; this.vy = 0;
        this.w = 22; this.h = 48; this.grounded = false;
        this.sliding = false; this.rot = 0; this.jumpCount = 0;
    }

    update() {
        let moveX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += moveX * (this.grounded ? 1.4 : 0.8);
        this.vx *= 0.88;
        
        if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
            if (this.grounded && !keys.jumpPressed) {
                this.vy = -19.5; // Massive Jump
                this.grounded = false; this.jumpCount = 1; keys.jumpPressed = true;
            } else if (progress.doubleJump && this.jumpCount < 2 && !keys.jumpPressed) {
                this.vy = -16; this.jumpCount = 2; keys.jumpPressed = true;
            }
        }

        if (progress.hasJetpack && (keys['KeyW'] || keys['Space'])) { this.vy -= 1.1; this.rot += 0.3; } 
        else { this.vy += 0.85; }

        this.x += this.vx; this.y += this.vy;
        if (!this.grounded) this.rot += this.vx * 0.15; else this.rot = 0;
        
        if (keys['KeyS'] || keys['ArrowDown']) {
            if (!this.sliding) { this.sliding = true; this.h = 24; this.y += 24; }
        } else if (this.sliding) {
            this.h = 48; this.y -= 24; this.sliding = false;
        }

        // --- ENHANCED COLLISION ENGINE ---
        let wasGrounded = this.grounded;
        this.grounded = false;
        for (let p of platforms) {
            // Check if player is above platform and falling
            if (this.x + this.w > p.x && this.x < p.x + p.w) {
                if (this.vy >= 0 && this.y + this.h >= p.y && this.y + this.h <= p.y + 25) {
                    this.y = p.y - this.h;
                    this.vy = 0;
                    this.grounded = true;
                    this.jumpCount = 0;
                }
            }
        }

        if (!progress.isGod) {
            obstacles.forEach(o => {
                if (this.x < o.x + o.w - 6 && this.x + this.w > o.x + 6 && this.y < o.y + o.h - 6 && this.y + this.h > o.y + 6) die();
            });
            if (this.y > 2000) die();
        }

        if (this.x > platforms[platforms.length-1].x + 300) {
            progress.worldIndex = (progress.worldIndex + 1) % worlds.length;
            startGame();
        }

        coins.forEach(c => {
            if (!c.collected && this.x < c.x + 25 && this.x + this.w > c.x && this.y < c.y + 25 && this.y + this.h > c.y) {
                c.collected = true; progress.coins += 100;
            }
        });

        document.getElementById('dist').innerText = Math.max(0, Math.floor((this.x - 100) / 10)) + "m";
    }

    draw() {
        if (progress.isGod) {
            ctx.beginPath(); ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 3;
            ctx.arc(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y, 42, 0, Math.PI*2);
            ctx.stroke();
        }
        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = "#fff";
        if (this.sliding) { ctx.fillRect(-16, -12, 32, 24); } 
        else {
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); // Solid block for better visuals
        }
        ctx.restore();
    }
}

function runCmd(cmd) {
    const parts = cmd.toLowerCase().split(' ');
    if (parts[0] === "/god") progress.isGod = !progress.isGod;
    if (parts[0] === "/fly") progress.hasJetpack = !progress.hasJetpack;
    if (parts[0] === "/double") progress.doubleJump = !progress.doubleJump;
    if (parts[0] === "/give") progress.coins += parseInt(parts[2]);
    if (parts[0] === "/skip") { progress.worldIndex = (progress.worldIndex + 1) % worlds.length; startGame(); }
    updateGuiStates();
}

function updateGuiStates() {
    document.getElementById('btn-god').classList.toggle('active', progress.isGod);
    document.getElementById('btn-fly').classList.toggle('active', progress.hasJetpack);
    document.getElementById('btn-jump').classList.toggle('active', progress.doubleJump);
}

function toggleGui() {
    adminGui.style.display = adminGui.style.display === "block" ? "none" : "block";
}

function startGame() {
    platforms = [{ x: 0, y: 500, w: 1500, h: 50 }];
    obstacles = []; coins = [];
    let lx = 1500;
    for (let i = 0; i < 40; i++) {
        let gap = 40 + Math.random() * 80; // Tight gaps
        let pw = 400 + Math.random() * 300;
        let ny = 300 + Math.random() * 300;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        if (i % 5 === 0) obstacles.push({ x: lx + gap + 100, y: ny - 100, w: 80, h: 5 }); 
        if (Math.random() > 0.4) coins.push({ x: lx + gap + 50, y: ny - 70, collected: false });
        lx += gap + pw;
    }
    if (!player) player = new Player();
    player.reset(); state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('world-tag').innerText = worlds[progress.worldIndex].name;
}

function die() { state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); }

function loop() {
    ctx.fillStyle = worlds[progress.worldIndex].bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.15;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.15;
        platforms.forEach(p => {
            ctx.fillStyle = worlds[progress.worldIndex].color; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 6);
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(p.x - camera.x, p.y + 6 - camera.y, p.w, p.h);
        });
        obstacles.forEach(o => { ctx.fillStyle = "#ff0044"; ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h); });
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.fillRect(c.x - camera.x, c.y - camera.y, 20, 20); } });
        player.draw();
        document.getElementById('coin-count').innerText = progress.coins;
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key === 'Shift') { adminConsole.style.display = "block"; adminInput.focus(); }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (['KeyW', 'Space', 'ArrowUp'].includes(e.code)) keys.jumpPressed = false;
});
adminInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (adminInput.value === "101165") {
            isAdminUnlocked = true;
            adminToggleBtn.style.display = "block";
        }
        adminConsole.style.display = "none"; adminInput.value = "";
    }
});

canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
