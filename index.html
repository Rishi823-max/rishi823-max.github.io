<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Elite: Human Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        
        #admin-toggle-btn, #shop-btn {
            background: #00f2ff; color: #000; padding: 10px;
            font-weight: 900; border-radius: 5px; cursor: pointer;
            pointer-events: auto; box-shadow: 0 0 15px #00f2ff; margin-bottom: 10px;
        }

        .panel {
            position: absolute; right: 20px; top: 80px;
            background: rgba(0,0,0,0.95); border: 2px solid #00f2ff; padding: 15px;
            color: #00f2ff; display: none; pointer-events: auto; width: 240px;
            border-radius: 12px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }
        .gui-btn {
            background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff;
            color: #00f2ff; width: 100%; padding: 8px; margin-bottom: 8px;
            cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .gui-btn:hover { background: #00f2ff; color: #000; }
        .active { background: #00ff00 !important; color: #000 !important; border-color: #00ff00 !important; }

        #admin-console {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 400px; background: #0a0a0a; border: 2px solid #00f2ff;
            padding: 15px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; }
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-tag" class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold mb-1 uppercase">DISTRICT 1</div>
                <div class="flex items-end gap-8">
                    <div><div class="text-[10px] opacity-50 text-white">DIST</div><div id="dist" class="text-3xl font-black text-white">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
            </div>
            <div class="absolute top-6 right-6 flex flex-col items-end">
                <div id="admin-toggle-btn" class="hidden" onclick="togglePanel('admin-gui')">ADMIN PANEL</div>
                <div id="shop-btn" onclick="togglePanel('shop-gui')">COIN SHOP</div>
            </div>
        </div>

        <div id="admin-gui" class="panel">
            <div class="text-xs font-black mb-4 border-b border-cyan-400 pb-2 text-center text-white">CHEAT MENU</div>
            <button id="btn-god" class="gui-btn" onclick="runCmd('/god')">GOD MODE</button>
            <button id="btn-fly" class="gui-btn" onclick="runCmd('/fly')">FLIGHT</button>
            <button class="gui-btn" onclick="runCmd('/give coins 1000')">+1000 COINS</button>
        </div>

        <div id="shop-gui" class="panel">
            <div class="text-xs font-black mb-4 border-b border-yellow-400 pb-2 text-center text-yellow-400">TRAIL SHOP</div>
            <button class="gui-btn" onclick="buyTrail('neon', 100)">NEON TRAIL (100)</button>
            <button class="gui-btn" onclick="buyTrail('fire', 500)">FIRE TRAIL (500)</button>
            <button class="gui-btn" onclick="buyTrail('ghost', 1000)">GHOST TRAIL (1000)</button>
        </div>

        <div id="admin-console">
            <input type="text" id="admin-input" placeholder="Enter key..." autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-7xl font-black text-white mb-2 italic hud-text">NEON RUNNER</h1>
            <button class="bg-cyan-500 text-black px-10 py-4 font-black rounded" onclick="startGame()">START RUN</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminInput = document.getElementById('admin-input');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [], powerups = [];
let camera = { x: 0, y: 0 };
let keys = {};
let isAdminUnlocked = false;

const worlds = [
    { name: "NEON CITY", color: "#00f2ff", bg: "#050505", particles: [] },
    { name: "VOID SPACE", color: "#ff00ff", bg: "#000011", particles: [] }
];

let progress = { 
    coins: 0, 
    hasJetpack: false, 
    isGod: false, 
    worldIndex: 0,
    trailType: 'none',
    ownedTrails: ['none']
};

class Player {
    constructor() { this.reset(); this.trail = []; }
    reset() {
        this.x = 100; this.y = 400; this.vx = 0; this.vy = 0;
        this.w = 24; this.h = 52; this.grounded = false;
        this.sliding = false; this.rot = 0; this.speedMult = 1;
    }

    update() {
        let moveX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += moveX * 1.5 * this.speedMult;
        this.vx *= 0.85;
        
        if ((keys['KeyW'] || keys['Space'] || keys['ArrowUp']) && this.grounded && !keys.jumpPressed) {
            this.vy = -18; this.grounded = false; keys.jumpPressed = true;
        }

        if (progress.hasJetpack && (keys['KeyW'] || keys['Space'])) this.vy -= 1.1;
        else this.vy += 0.85;

        this.x += this.vx; this.y += this.vy;

        this.grounded = false;
        for (let p of platforms) {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.vy >= 0 && this.y + this.h >= p.y && this.y + this.h <= p.y + 20) {
                this.y = p.y - this.h; this.vy = 0; this.grounded = true;
            }
        }

        if (!progress.isGod) {
            obstacles.forEach(o => { if (this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y) die(); });
            if (this.y > 1500) die();
        }

        // Power-Up Collision
        powerups.forEach((p, i) => {
            if (!p.taken && this.x < p.x + 30 && this.x + this.w > p.x && this.y < p.y + 30 && this.y + this.h > p.y) {
                p.taken = true;
                if (p.type === 'speed') { this.speedMult = 2; setTimeout(() => this.speedMult = 1, 5000); }
            }
        });

        coins.forEach(c => { if (!c.collected && this.x < c.x + 20 && this.x + this.w > c.x && this.y < c.y + 20 && this.y + this.h > c.y) { c.collected = true; progress.coins += 10; } });

        this.trail.push({x: this.x + this.w/2, y: this.y + this.h/2});
        if (this.trail.length > 10) this.trail.shift();
        
        document.getElementById('dist').innerText = Math.floor(this.x / 10) + "m";
        document.getElementById('coin-count').innerText = progress.coins;
    }

    draw() {
        // Draw Trail
        if (progress.trailType !== 'none') {
            this.trail.forEach((t, i) => {
                ctx.globalAlpha = i / 10;
                ctx.fillStyle = progress.trailType === 'neon' ? '#00f2ff' : progress.trailType === 'fire' ? '#ff4400' : '#ffffff';
                ctx.fillRect(t.x - camera.x - 5, t.y - camera.y - 5, 10, 10);
            });
            ctx.globalAlpha = 1;
        }

        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        
        // DRAW HUMAN
        ctx.fillStyle = "#ffdbac"; // Skin
        ctx.fillRect(-6, -26, 12, 12); // Head
        ctx.fillStyle = "#333"; // Shirt
        ctx.fillRect(-8, -14, 16, 18); // Torso
        ctx.fillStyle = "#111"; // Pants
        ctx.fillRect(-8, 4, 6, 12); ctx.fillRect(2, 4, 6, 12); // Legs
        ctx.restore();
    }
}

function buyTrail(type, price) {
    if (progress.coins >= price) {
        progress.coins -= price;
        progress.trailType = type;
        alert(type.toUpperCase() + " TRAIL EQUIPPED!");
    }
}

function runCmd(cmd) {
    if (cmd === '/god') progress.isGod = !progress.isGod;
    if (cmd === '/fly') progress.hasJetpack = !progress.hasJetpack;
    if (cmd.includes('/give')) progress.coins += 1000;
}

function togglePanel(id) {
    const p = document.getElementById(id);
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function startGame() {
    platforms = [{ x: 0, y: 500, w: 2000, h: 50 }];
    obstacles = []; coins = []; powerups = [];
    let lx = 2000;
    for (let i = 0; i < 50; i++) {
        let gap = 60 + Math.random() * 100;
        let pw = 400 + Math.random() * 300;
        let ny = 350 + Math.random() * 250;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        if (i % 6 === 0) obstacles.push({ x: lx + gap + 100, y: ny - 100, w: 100, h: 10 });
        if (i % 10 === 0) powerups.push({ x: lx + gap + 50, y: ny - 60, type: 'speed', taken: false });
        coins.push({ x: lx + gap + 20, y: ny - 50, collected: false });
        lx += gap + pw;
    }
    player = new Player();
    state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

function die() { state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); }

function loop() {
    ctx.fillStyle = worlds[progress.worldIndex].bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        platforms.forEach(p => {
            ctx.fillStyle = worlds[progress.worldIndex].color;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 6);
        });
        obstacles.forEach(o => { ctx.fillStyle = "#ff0044"; ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h); });
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.fillRect(c.x - camera.x, c.y - camera.y, 15, 15); } });
        powerups.forEach(p => { if (!p.taken) { ctx.fillStyle = "#00ff00"; ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, 10, 0, Math.PI*2); ctx.fill(); } });
        player.draw();
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if (e.key === 'Shift') { document.getElementById('admin-console').style.display = 'block'; document.getElementById('admin-input').focus(); }
});
window.addEventListener('keyup', e => { 
    keys[e.code] = false; 
    if (['KeyW', 'Space', 'ArrowUp'].includes(e.code)) keys.jumpPressed = false;
});

document.getElementById('admin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (e.target.value === '101165') {
            isAdminUnlocked = true;
            document.getElementById('admin-toggle-btn').classList.remove('hidden');
        }
        document.getElementById('admin-console').style.display = 'none'; e.target.value = '';
    }
});

canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
