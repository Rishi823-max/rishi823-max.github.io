<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour: Infinity Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'monospace'; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        .panel {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: rgba(5,5,5,0.98); border: 2px solid #00f2ff; padding: 20px;
            color: #00f2ff; display: none; pointer-events: auto; width: 400px;
            border-radius: 10px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.6); z-index: 1000;
        }
        .close-btn { position: absolute; right: 10px; top: 10px; color: #ff0044; cursor: pointer; border: 1px solid #ff0044; padding: 2px 8px; }
        .gui-btn { background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; color: #00f2ff; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .gui-btn:hover { background: #00f2ff; color: #000; }
        #admin-console { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 500px; background: #000; border: 2px solid #00f2ff; padding: 15px; pointer-events: auto; color: #00f2ff; display: none; }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; }
        #broadcast-msg { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); color: #00f2ff; font-family: 'Orbitron'; font-size: 2rem; opacity: 0; transition: 0.5s; pointer-events: none; text-align: center; font-weight: 900; width: 100%; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="broadcast-msg">SYSTEM ALERT</div>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-name" class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold mb-1 uppercase">DISTRICT: PRIME</div>
                <div class="flex items-end gap-8">
                    <div><div class="text-[10px] opacity-60">COINS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                    <div><div class="text-[10px] opacity-60">LIVES</div><div id="life-count" class="text-3xl font-black text-red-500">3</div></div>
                    <div><div class="text-[10px] opacity-60">DISTANCE</div><div id="dist-tag" class="text-xl font-black text-white">0m</div></div>
                </div>
            </div>
            <div class="absolute top-6 right-6 flex flex-col items-end">
                <button id="admin-toggle-btn" class="bg-red-600 text-white p-3 font-bold mb-2 pointer-events-auto rounded" onclick="togglePanel('admin-gui')">ADMIN [101165]</button>
                <button class="bg-yellow-400 text-black p-3 font-bold pointer-events-auto rounded" onclick="togglePanel('shop-gui')">SHOP</button>
            </div>
        </div>

        <div id="admin-gui" class="panel">
            <div class="close-btn" onclick="togglePanel('admin-gui')">X</div>
            <h3 class="text-center mb-4 font-bold">MASTER COMMANDS</h3>
            <button class="gui-btn" onclick="runCmd('/coins 1t')">1 Trillion Coins</button>
            <button class="gui-btn" onclick="runCmd('/lives 999')">999 Lives</button>
            <button class="gui-btn" onclick="runCmd('/jump 30')">Super Jump</button>
            <button class="gui-btn" onclick="runCmd('/speed 6')">Super Speed</button>
            <button class="gui-btn" onclick="runCmd('/skip')">Skip Segment</button>
            <button class="gui-btn" onclick="runCmd('/god')">Toggle God Mode</button>
        </div>

        <div id="shop-gui" class="panel">
            <div class="close-btn" onclick="togglePanel('shop-gui')">X</div>
            <button class="gui-btn" onclick="buyItem('rainbow', 1000000)">Rainbow Trail (1M)</button>
            <button class="gui-btn" onclick="buyItem('void', 500000)">Void Trail (500k)</button>
        </div>

        <div id="admin-console"><input type="text" id="admin-input" placeholder="Type command..." autocomplete="off"></div>

        <div id="menu" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center pointer-events-auto">
            <h1 class="text-7xl font-black text-white mb-2 hud-text italic">NEON PARKOUR</h1>
            <p class="text-cyan-400 mb-8 tracking-widest">PERFORMANCE EDITION</p>
            <button class="bg-white text-black px-24 py-6 font-black text-3xl hover:scale-105 transition-all" onclick="startGame()">START RUN</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let state = 'MENU', player, platforms = [], obstacles = [], coins = [], checkpoints = [], powerups = [];
let camera = { x: 0, y: 0 }, keys = {}, gameTick = 0, lastCheckpoint = { x: 0, y: 400 };
let gravityDir = 1, currentWorld = 1, maxDist = 0, runSpeed = 1.8, jumpPower = 18.5, isFrozen = false;

let progress = { coins: 0, lives: 3, skin: '#fff', trail: 'none', isGod: false, infiniteFuel: false };

class Player {
    constructor() { this.reset(); this.trail = []; }
    reset(px = 0, py = 400) {
        this.x = px; this.y = py; this.vx = 0; this.vy = 0;
        this.w = 20; this.h = 50; this.grounded = false; this.rot = 0;
    }

    update() {
        if (isFrozen) return;
        let move = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += move * runSpeed;
        this.vx *= 0.85;

        if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
            if (this.grounded && !keys.jumpPressed) { this.vy = -jumpPower * gravityDir; this.grounded = false; keys.jumpPressed = true; }
            else if (progress.infiniteFuel) { this.vy -= 1.2 * gravityDir; }
        }
        
        this.vy += 0.8 * gravityDir;
        this.x += this.vx; this.y += this.vy;
        if (!this.grounded) this.rot += 0.15 * gravityDir; else this.rot = 0;

        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w) {
                if (gravityDir === 1 && this.vy >= 0 && this.y + this.h >= p.y && this.y + this.h <= p.y + 30) {
                    this.y = p.y - this.h; this.vy = 0; this.grounded = true;
                } else if (gravityDir === -1 && this.vy <= 0 && this.y <= p.y + p.h && this.y >= p.y + p.h - 30) {
                    this.y = p.y + p.h; this.vy = 0; this.grounded = true;
                }
            }
        });

        checkpoints.forEach(cp => { if (!cp.active && this.x > cp.x) { cp.active = true; lastCheckpoint = {x: cp.x, y: cp.y-100}; broadcast("PROGRESS SAVED: " + Math.floor(this.x) + "M"); } });
        
        powerups.forEach(pu => {
            if (!pu.collected && this.x < pu.x + 30 && this.x + this.w > pu.x && this.y < pu.y + 30 && this.y + this.h > pu.y) {
                pu.collected = true; progress.lives++; broadcast("+1 EXTRA LIFE");
            }
        });

        if (!progress.isGod) {
            obstacles.forEach(o => { if (this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y) die(); });
            if (this.y > 3000 || this.y < -1500) die();
        }

        coins.forEach(c => { if (!c.collected && this.x < c.x + 30 && this.x + this.w > c.x && this.y < c.y + 30 && this.y + this.h > c.y) { c.collected = true; progress.coins += 1000; } });

        this.trail.push({x: this.x + 10, y: this.y + 25});
        if (this.trail.length > 15) this.trail.shift();

        maxDist = Math.floor(this.x);
        document.getElementById('coin-count').innerText = progress.coins.toLocaleString();
        document.getElementById('life-count').innerText = progress.lives;
        document.getElementById('dist-tag').innerText = maxDist + "m";
    }

    draw() {
        if (progress.trail !== 'none') {
            this.trail.forEach((t, i) => {
                ctx.globalAlpha = i / 15;
                ctx.fillStyle = progress.trail === 'rainbow' ? `hsl(${gameTick * 5 + i * 10}, 100%, 50%)` : "#00f2ff";
                ctx.fillRect(t.x - camera.x - 4, t.y - camera.y - 4, 8, 8);
            });
        }
        ctx.globalAlpha = 1; ctx.save();
        ctx.translate(this.x + 10 - camera.x, this.y + 25 - camera.y);
        if(gravityDir === -1) ctx.scale(1, -1);
        ctx.rotate(this.rot);
        ctx.strokeStyle = progress.skin; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, -20, 6, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-12, 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(12, 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-10, 25); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(10, 25); ctx.stroke();
        ctx.restore();
    }
}

function die() {
    if (progress.lives > 1) {
        progress.lives--;
        player.x = lastCheckpoint.x;
        player.y = lastCheckpoint.y;
    } else {
        player.reset(0, 400);
        progress.lives = 3;
        lastCheckpoint = {x:0, y:400};
        broadcast("GAME OVER - RESTARTING");
    }
    gravityDir = 1;
}

function broadcast(msg) {
    const b = document.getElementById('broadcast-msg');
    b.innerText = msg; b.style.opacity = 1;
    setTimeout(() => b.style.opacity = 0, 2000);
}

function runCmd(cmd) {
    const p = cmd.split(' ');
    if (p[0] === '/coins') { if (p[1] === '1t') progress.coins = 1000000000000; else progress.coins += parseInt(p[1]) || 0; }
    if (p[0] === '/lives') progress.lives = parseInt(p[1]) || 3;
    if (p[0] === '/jump') jumpPower = parseFloat(p[1]) || 18.5;
    if (p[0] === '/speed') runSpeed = parseFloat(p[1]) || 1.8;
    if (p[0] === '/tp') { player.x = parseInt(p[1]); player.y = 400; }
    if (p[0] === '/freeze') isFrozen = !isFrozen;
    if (p[0] === '/kill') die();
    if (p[0] === '/say') broadcast(cmd.substring(5).toUpperCase());
    if (p[0] === '/god') { progress.isGod = !progress.isGod; broadcast("GOD MODE: " + progress.isGod); }
    if (p[0] === '/skip') { 
        const next = checkpoints.find(c => c.x > player.x);
        if(next) player.x = next.x;
    }
}

function buyItem(type, price) {
    if (progress.coins >= price) {
        progress.coins -= price;
        progress.trail = type;
        broadcast("TRAIL UPDATED");
    }
}

function togglePanel(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

function startGame() {
    platforms = [{ x: 0, y: 500, w: 2000, h: 60 }];
    obstacles = []; coins = []; checkpoints = []; powerups = []; gameTick = 0;
    let lx = 800;
    for (let i = 0; i < 800; i++) {
        let gap = 140 + Math.random() * 200;
        let pw = 400 + Math.random() * 500;
        let ny = 200 + Math.random() * 500;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 50 });
        if (i % 2 === 0) checkpoints.push({ x: lx + gap, y: ny, active: false });
        if (i % 7 === 0) obstacles.push({ x: lx + gap + 200, y: ny - 10, w: 80, h: 80 });
        if (i % 25 === 0) powerups.push({ x: lx + gap + 100, y: ny - 100, collected: false });
        coins.push({ x: lx + gap + 50, y: ny - 60, collected: false });
        lx += gap + pw;
    }
    player = new Player(); state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
}

function loop() {
    ctx.fillStyle = "#010101"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (state === 'PLAY') {
        gameTick++; player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

        // Optimized Rendering: Only draw what's visible
        platforms.forEach(p => {
            if (p.x > camera.x - 1000 && p.x < camera.x + canvas.width + 1000) {
                ctx.fillStyle = "#00f2ff"; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 4);
                ctx.fillRect(p.x - camera.x, p.y + p.h - 4 - camera.y, p.w, 4);
            }
        });
        checkpoints.forEach(cp => { 
            if (cp.x > camera.x - 500 && cp.x < camera.x + canvas.width + 500) {
                ctx.fillStyle = cp.active ? "#00ff88" : "#111"; 
                ctx.fillRect(cp.x - camera.x, cp.y - 120 - camera.y, 10, 240); 
            }
        });
        obstacles.forEach(o => {
            if (o.x > camera.x - 500 && o.x < camera.x + canvas.width + 500) {
                ctx.fillStyle = "#ff0044"; ctx.save(); ctx.translate(o.x + 40 - camera.x, o.y + 40 - camera.y);
                ctx.rotate(gameTick * 0.1); ctx.fillRect(-40, -5, 80, 10); ctx.fillRect(-5, -40, 10, 80); ctx.restore();
            }
        });
        powerups.forEach(pu => {
            if (!pu.collected && pu.x > camera.x - 500 && pu.x < camera.x + canvas.width + 500) {
                ctx.fillStyle = "#ff0044"; ctx.font = "20px Arial"; ctx.fillText("❤️", pu.x - camera.x, pu.y - camera.y);
            }
        });
        coins.forEach(c => { 
            if (!c.collected && c.x > camera.x - 500 && c.x < camera.x + canvas.width + 500) {
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x - camera.x + 10, c.y - camera.y + 10, 12, 0, Math.PI*2); ctx.fill();
            }
        });
        player.draw();
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if (e.key === 'g' || e.key === 'G') gravityDir *= -1;
    if (e.key === 'Shift') { document.getElementById('admin-console').style.display = 'block'; document.getElementById('admin-input').focus(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; if (['KeyW', 'Space', 'ArrowUp'].includes(e.code)) keys.jumpPressed = false; });
document.getElementById('admin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        runCmd(e.target.value);
        document.getElementById('admin-console').style.display = 'none'; e.target.value = '';
    }
});
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
