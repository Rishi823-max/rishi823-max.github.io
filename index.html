<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dev Portfolio | Game Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            touch-action: none; 
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 600px;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #1f2937;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-wrapper.fullscreen-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            border-radius: 0;
            border: none;
        }

        canvas { display: block; image-rendering: auto; }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            color: white;
            z-index: 10;
        }

        .interactable { pointer-events: auto; }
        .tab-btn { color: #6b7280; font-weight: 700; transition: all 0.2s; }
        .tab-btn.active { background-color: #3b82f6; color: white; }
        .ctrl-hint {
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Menu Styles */
        .menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #3b82f6;
            padding: 1.5rem;
            text-align: center;
            border-radius: 1rem;
            pointer-events: auto;
            color: white;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            width: 340px;
            max-width: 90%;
            z-index: 50;
        }
        .hidden { display: none; }
        .btn-action {
            background: #3b82f6;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0.4rem;
            transition: all 0.2s;
            text-transform: uppercase;
            border: none;
        }
        .btn-action:hover { background: #60a5fa; transform: scale(1.05); }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-tighter text-white">ARCADE.DEV</span>
            <div class="hidden md:flex gap-3">
                <span class="ctrl-hint text-gray-400 font-mono">[ESC] Fullscreen</span>
                <span class="ctrl-hint text-gray-400 font-mono">Arrows to Move</span>
            </div>
        </div>
    </nav>

    <section id="projects" class="pt-32 pb-20 px-6">
        <div class="max-w-5xl mx-auto">
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2 bg-black/40 p-1 rounded-2xl border border-white/5">
                    <button id="btnDropper" onclick="switchGame('dropper')" class="tab-btn active px-6 py-2 rounded-xl text-sm">Neon Dropper</button>
                    <button id="btnNeon" onclick="switchGame('neon')" class="tab-btn px-6 py-2 rounded-xl text-sm">Neon Survivor</button>
                    <button id="btnRivals" onclick="switchGame('rivals')" class="tab-btn px-6 py-2 rounded-xl text-sm">Rivals 1v1</button>
                </div>
            </div>

            <div id="gameContainer" class="game-wrapper shadow-2xl shadow-blue-500/10">
                <canvas id="gameCanvas"></canvas>
                
                <div id="gameUI" class="ui-layer">
                    <!-- Dynamic HUD -->
                    <div id="hud" class="hidden absolute inset-0 p-6 flex justify-between items-start">
                        <div class="flex gap-4">
                            <div class="bg-black/60 px-4 py-2 rounded-lg border border-white/10">
                                <div id="stat1Label" class="text-[10px] text-blue-400 font-bold uppercase">Score</div>
                                <div id="stat1Val" class="text-xl font-black">0</div>
                            </div>
                            <div id="rivalScoreBox" class="hidden bg-black/60 px-4 py-2 rounded-lg border border-white/10">
                                <div class="text-[10px] text-red-400 font-bold uppercase">Enemy</div>
                                <div id="statEnemyVal" class="text-xl font-black">0</div>
                            </div>
                        </div>
                        <div id="ammoBox" class="hidden bg-black/60 px-4 py-2 rounded-lg border border-white/10">
                            <div class="text-[10px] text-purple-400 font-bold uppercase">Ammo</div>
                            <div id="ammoVal" class="text-xl font-black">8</div>
                        </div>
                    </div>

                    <!-- Start Menu -->
                    <div id="start-menu" class="menu">
                        <h1 id="menuTitle" class="text-2xl font-black mb-2 uppercase">Neon Dropper</h1>
                        <p id="menuDesc" class="text-[10px] opacity-60 mb-6 uppercase tracking-widest">Ultra-fast Descent</p>
                        <button class="btn-action w-full" onclick="initCurrentGame()">Start Match</button>
                    </div>

                    <!-- Death Menu -->
                    <div id="death-menu" class="menu hidden">
                        <h2 class="text-2xl font-bold text-red-500 mb-2">MATCH ENDED</h2>
                        <p class="text-lg mb-6">Final Score: <span id="finalScore">0</span></p>
                        <button class="btn-action w-full" onclick="initCurrentGame()">Play Again</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        const startMenu = document.getElementById('start-menu');
        const deathMenu = document.getElementById('death-menu');
        const hud = document.getElementById('hud');

        let currentGame = 'dropper';
        let gameActive = false;
        let keys = {};
        let frameCount = 0;

        // Shared game variables
        let player, entities, projectiles, cameraY, speed, score, enemyScore;

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Escape') toggleFullscreen();
            if (currentGame === 'dropper' && gameActive && (e.code === 'Space' || e.code.includes('Arrow'))) {
                player.dir *= -1;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => {
            if(currentGame === 'dropper' && gameActive) player.dir *= -1;
        });

        function toggleFullscreen() {
            container.classList.toggle('fullscreen-mode');
            setTimeout(resize, 50);
        }

        function resize() {
            // Neon Dropper window is now bigger (80% of container or 600px max)
            if (currentGame === 'dropper') {
                canvas.width = Math.min(container.clientWidth * 0.8, 600);
            } else {
                canvas.width = container.clientWidth;
            }
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function switchGame(type) {
            currentGame = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
            
            const titles = { dropper: "Neon Dropper", neon: "Neon Survivor", rivals: "Rivals 1v1" };
            const descs = { dropper: "Ultra-fast Descent", neon: "Horde Survival", rivals: "Tactical Combat" };
            
            document.getElementById('menuTitle').innerText = titles[type];
            document.getElementById('menuDesc').innerText = descs[type];
            
            startMenu.classList.remove('hidden');
            deathMenu.classList.add('hidden');
            hud.classList.add('hidden');
            gameActive = false;
            resize();
        }

        function initCurrentGame() {
            startMenu.classList.add('hidden');
            deathMenu.classList.add('hidden');
            hud.classList.remove('hidden');
            gameActive = true;
            frameCount = 0;
            score = 0;
            enemyScore = 0;
            entities = [];
            projectiles = [];

            // UI Reset
            document.getElementById('rivalScoreBox').classList.add('hidden');
            document.getElementById('ammoBox').classList.add('hidden');
            document.getElementById('stat1Label').innerText = "Score";

            if (currentGame === 'dropper') {
                player = { x: canvas.width/2, y: 150, dir: 1 };
                speed = 3.0;
                cameraY = 0;
            } else if (currentGame === 'neon') {
                player = { x: canvas.width/2, y: canvas.height/2, hp: 100, speed: 4 };
                document.getElementById('stat1Label').innerText = "Kills";
            } else if (currentGame === 'rivals') {
                player = { x: 100, y: canvas.height/2, hp: 100, ammo: 8, maxAmmo: 8 };
                entities.push({ x: canvas.width-100, y: canvas.height/2, hp: 100, lastShot: 0 });
                document.getElementById('rivalScoreBox').classList.remove('hidden');
                document.getElementById('ammoBox').classList.remove('hidden');
            }
            
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (currentGame === 'dropper') {
                speed += 0.001;
                player.x += player.dir * (5.5 + speed/5);
                player.y += speed;
                cameraY = player.y - 150;
                if (player.x < 15 || player.x > canvas.width - 15) endGame();

                if (entities.length < 6) {
                    const y = entities.length === 0 ? player.y + 400 : entities[entities.length-1].y + 250;
                    const gap = Math.max(90, 160 - (speed * 3));
                    const cx = 80 + Math.random() * (canvas.width - 160);
                    entities.push({ y, cx, gap });
                }
                entities.forEach((o, i) => {
                    if (Math.abs(player.y - o.y) < 15) {
                        if (player.x < o.cx - o.gap/2 || player.x > o.cx + o.gap/2) endGame();
                    }
                    if (o.y < player.y - 300) entities.splice(i, 1);
                });
                score = Math.floor(player.y / 10);

            } else if (currentGame === 'neon') {
                let mx = 0, my = 0;
                if(keys['ArrowUp'] || keys['KeyW']) my--;
                if(keys['ArrowDown'] || keys['KeyS']) my++;
                if(keys['ArrowLeft'] || keys['KeyA']) mx--;
                if(keys['ArrowRight'] || keys['KeyD']) mx++;
                if(mx || my) {
                    const a = Math.atan2(my, mx);
                    player.x += Math.cos(a) * player.speed;
                    player.y += Math.sin(a) * player.speed;
                }
                player.x = Math.max(20, Math.min(canvas.width-20, player.x));
                player.y = Math.max(20, Math.min(canvas.height-20, player.y));

                if(frameCount % 45 === 0) {
                    entities.push({ x: Math.random()*canvas.width, y: -20, hp: 10 });
                }
                entities.forEach((e, i) => {
                    const a = Math.atan2(player.y-e.y, player.x-e.x);
                    e.x += Math.cos(a) * 2; e.y += Math.sin(a) * 2;
                    if(Math.hypot(player.x-e.x, player.y-e.y) < 25) endGame();
                });
                if(frameCount % 20 === 0 && entities.length > 0) {
                    const a = Math.atan2(entities[0].y-player.y, entities[0].x-player.x);
                    projectiles.push({ x: player.x, y: player.y, vx: Math.cos(a)*10, vy: Math.sin(a)*10, owner: 'p' });
                }
                projectiles.forEach((p, pi) => {
                    p.x += p.vx; p.y += p.vy;
                    entities.forEach((e, ei) => {
                        if(Math.hypot(p.x-e.x, p.y-e.y) < 20) {
                            score++; entities.splice(ei, 1); p.dead = true;
                        }
                    });
                });

            } else if (currentGame === 'rivals') {
                if(keys['ArrowUp']) player.y -= 5;
                if(keys['ArrowDown']) player.y += 5;
                player.y = Math.max(30, Math.min(canvas.height-30, player.y));
                
                const ai = entities[0];
                ai.y += Math.sin(frameCount/20) * 4;

                if(keys['Space'] && player.ammo > 0) {
                    projectiles.push({ x: player.x, y: player.y, vx: 12, vy: 0, owner: 'p' });
                    player.ammo--; keys['Space'] = false;
                    if(player.ammo === 0) setTimeout(() => player.ammo = 8, 1000);
                }
                if(frameCount % 60 === 0) {
                    const a = Math.atan2(player.y-ai.y, player.x-ai.x);
                    projectiles.push({ x: ai.x, y: ai.y, vx: Math.cos(a)*8, vy: Math.sin(a)*8, owner: 'e' });
                }
                projectiles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.owner === 'p' && Math.hypot(p.x-ai.x, p.y-ai.y) < 30) { score++; p.dead = true; }
                    if(p.owner === 'e' && Math.hypot(p.x-player.x, p.y-player.y) < 25) { enemyScore++; p.dead = true; }
                    if(score >= 10 || enemyScore >= 10) endGame();
                });
                document.getElementById('ammoVal').innerText = player.ammo;
                document.getElementById('statEnemyVal').innerText = enemyScore;
            }

            projectiles = projectiles.filter(p => !p.dead && p.x > -50 && p.x < canvas.width+50);
            document.getElementById('stat1Val').innerText = score;
            frameCount++;
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentGame === 'dropper') {
                ctx.save();
                ctx.translate(0, -cameraY);
                ctx.fillStyle = '#111';
                ctx.fillRect(0, cameraY, 15, canvas.height);
                ctx.fillRect(canvas.width-15, cameraY, 15, canvas.height);
                ctx.fillStyle = '#f00';
                entities.forEach(o => {
                    ctx.fillRect(15, o.y-10, o.cx-o.gap/2-15, 20);
                    ctx.fillRect(o.cx+o.gap/2, o.y-10, canvas.width-(o.cx+o.gap/2)-15, 20);
                });
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
                ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            } else {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(player.x, player.y, 18, 0, Math.PI*2); ctx.fill();
                entities.forEach(e => {
                    ctx.fillStyle = (currentGame === 'rivals') ? '#f43f5e' : '#3b82f6';
                    ctx.beginPath(); ctx.arc(e.x, e.y, 22, 0, Math.PI*2); ctx.fill();
                });
                projectiles.forEach(p => {
                    ctx.fillStyle = p.owner === 'p' ? '#3b82f6' : '#fff';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                });
            }
        }

        function endGame() {
            gameActive = false;
            deathMenu.classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
        }

        function gameLoop() {
            if (!gameActive) return;
            update(); draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
