<!DOCTYPE html>
html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dev Portfolio | Game Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            touch-action: none; 
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 600px;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #1f2937;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-wrapper.fullscreen-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            border-radius: 0;
            border: none;
        }

        canvas { display: block; image-rendering: auto; }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            color: white;
            z-index: 10;
        }

        .interactable { pointer-events: auto; }
        .tab-btn.active { background-color: #3b82f6; color: white; }
        .ctrl-hint {
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Neon Dropper Specific Menu Styles */
        .menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #0ff;
            padding: 1.5rem;
            text-align: center;
            border-radius: 1rem;
            pointer-events: auto;
            color: #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            width: 340px;
            max-width: 90%;
            z-index: 50;
        }
        .hidden { display: none; }
        .btn-neon {
            background: #0ff;
            color: #000;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0.4rem;
            transition: all 0.2s;
            text-transform: uppercase;
            border: none;
        }
        .btn-neon:hover { background: #fff; box-shadow: 0 0 20px #0ff; transform: scale(1.05); }
        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.6rem;
            margin-bottom: 0.4rem;
            border-radius: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .scroll-area { max-height: 250px; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-tighter text-white">ARCADE.DEV</span>
            <div class="hidden md:flex gap-3">
                <span class="ctrl-hint text-gray-400 font-mono">[ESC] Fullscreen Toggle</span>
            </div>
        </div>
    </nav>

    <section id="projects" class="pt-32 pb-20 px-6">
        <div class="max-w-5xl mx-auto">
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2 bg-black/40 p-1 rounded-2xl border border-white/5">
                    <button id="btnDropper" onclick="switchGame('dropper')" class="tab-btn active px-6 py-2 rounded-xl text-sm font-bold transition-all">
                        Neon Dropper
                    </button>
                    <button id="btnNeon" onclick="switchGame('neon')" class="tab-btn px-6 py-2 rounded-xl text-sm font-bold text-gray-500 hover:text-white transition-all">
                        Neon Survivor
                    </button>
                </div>
            </div>

            <div id="gameContainer" class="game-wrapper shadow-2xl shadow-blue-500/10">
                <canvas id="gameCanvas"></canvas>
                
                <!-- Dropper Specific UI -->
                <div id="dropperUI" class="ui-layer">
                    <div id="dropperStats" class="absolute top-5 w-full flex flex-col items-center hidden">
                        <div id="high-score-display" class="text-3xl font-black text-cyan-400">HIGH: 0</div>
                        <div id="score-display" class="text-sm font-bold opacity-70">SCORE: 0</div>
                        <div id="wallet-display" class="text-[10px] text-gray-500">Coins: 0</div>
                    </div>

                    <!-- Dropper Menus -->
                    <div id="start-menu" class="menu">
                        <h1 class="text-2xl font-bold mb-4">NEON DROPPER EXTREME</h1>
                        <button class="btn-neon w-full" onclick="startDropper()">START DESCENT</button>
                        <div class="flex gap-2 mt-2">
                            <button class="btn-neon flex-1 text-xs" onclick="toggleShop(true)">Shop</button>
                            <button class="btn-neon flex-1 text-xs" onclick="toggleSkins(true)">Skins</button>
                        </div>
                    </div>

                    <div id="shop-menu" class="menu hidden">
                        <h2 class="text-xl font-bold mb-4">EQUIPMENT</h2>
                        <div class="scroll-area text-left text-xs">
                            <div class="shop-item"><span>REVIVE (60c)</span><button onclick="purchase('revive', 60)" class="btn-neon text-[10px]">BUY</button></div>
                            <div class="shop-item"><span>COIN MAGNET (300c)</span><button id="buy-magnet" onclick="purchaseUpgrade('magnet', 300)" class="btn-neon text-[10px]">BUY</button></div>
                        </div>
                        <button class="btn-neon w-full mt-4" onclick="toggleShop(false)">EXIT</button>
                    </div>

                    <div id="skins-menu" class="menu hidden">
                        <h2 class="text-xl font-bold mb-4 text-purple-400">SKINS</h2>
                        <div class="scroll-area text-left text-xs">
                            <div class="shop-item"><span>ZENITH (40c)</span><button id="skin-btn-zenith" onclick="purchaseSkin('zenith', 40)" class="btn-neon text-[10px]">BUY</button></div>
                            <div class="shop-item"><span>GLITCH (320c)</span><button id="skin-btn-glitch" onclick="purchaseSkin('glitch', 320)" class="btn-neon text-[10px]">BUY</button></div>
                        </div>
                        <button class="btn-neon w-full mt-4" onclick="toggleSkins(false)">BACK</button>
                    </div>
                    
                    <div id="death-menu" class="menu hidden">
                        <h2 class="text-2xl font-bold text-red-500 mb-2">SYSTEM FAILURE</h2>
                        <p class="text-lg mb-4">Score: <span id="final-score">0</span></p>
                        <button class="btn-neon w-full" onclick="startDropper()">REBOOT</button>
                    </div>
                </div>

                <!-- Shared UI Logic for Survivor (Omitted for brevity but functional in code) -->
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        
        let currentGame = 'dropper';
        let gameActive = false;
        let keys = {};

        // --- GLOBAL INPUTS ---
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Escape') toggleFullscreen();
            if (currentGame === 'dropper' && (e.code === 'Space' || e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
                handleDropperAction();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(currentGame === 'dropper') handleDropperAction(); });

        function toggleFullscreen() {
            container.classList.toggle('fullscreen-mode');
            setTimeout(resize, 50);
        }

        function resize() {
            if (currentGame === 'dropper') {
                canvas.width = Math.min(container.clientWidth, 500);
            } else {
                canvas.width = container.clientWidth;
            }
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function switchGame(type) {
            location.reload(); // Simplest way to clear state
        }

        // --- NEON DROPPER LOGIC ---
        let score = 0, coins = parseInt(localStorage.getItem('ndCoins')) || 0;
        let highScore = parseInt(localStorage.getItem('ndHigh')) || 0;
        let speed = 3.0, cameraY = 0, obstacles = [], items = [], particles = [];
        let player = { x: 0, y: 150, dir: 1, trail: [] };
        let upgrades = JSON.parse(localStorage.getItem('ndUpgrades')) || { magnet: false };
        let skins = JSON.parse(localStorage.getItem('ndSkins')) || { default: true };
        let currentSkin = localStorage.getItem('ndSkin') || 'default';

        function startDropper() {
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('death-menu').classList.add('hidden');
            document.getElementById('dropperStats').classList.remove('hidden');
            gameActive = true;
            score = 0; speed = 3.0; obstacles = []; items = [];
            player.x = canvas.width/2; player.y = 150;
            requestAnimationFrame(dropperLoop);
        }

        function handleDropperAction() {
            if (currentGame === 'dropper' && gameActive) player.dir *= -1;
        }

        function dropperLoop() {
            if (!gameActive || currentGame !== 'dropper') return;
            
            // Update
            speed += 0.001;
            player.x += player.dir * 5.8;
            player.y += speed;
            cameraY = player.y - 150;

            // Wall Collisions
            if (player.x < 15 || player.x > canvas.width - 15) endDropper();

            // Obstacle Gen
            if (obstacles.length < 5) {
                const y = obstacles.length === 0 ? player.y + 400 : obstacles[obstacles.length-1].y + 280;
                const gap = 120 - (speed * 2);
                const cx = 50 + Math.random() * (canvas.width - 100);
                obstacles.push({ y, cx, gap });
            }

            // Collisions
            obstacles.forEach((o, i) => {
                if (Math.abs(player.y - o.y) < 15) {
                    if (player.x < o.cx - o.gap/2 || player.x > o.cx + o.gap/2) endDropper();
                }
                if (o.y < player.y - 200) obstacles.splice(i, 1);
            });

            score = Math.floor(player.y / 10);
            document.getElementById('score-display').innerText = "SCORE: " + score;

            // Draw
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(0, -cameraY);

            // Walls
            ctx.fillStyle = '#111';
            ctx.fillRect(0, cameraY, 15, canvas.height);
            ctx.fillRect(canvas.width - 15, cameraY, 15, canvas.height);

            // Obstacles
            ctx.fillStyle = '#f00';
            obstacles.forEach(o => {
                ctx.fillRect(15, o.y - 10, o.cx - o.gap/2 - 15, 20);
                ctx.fillRect(o.cx + o.gap/2, o.y - 10, canvas.width - (o.cx + o.gap/2) - 15, 20);
            });

            // Player
            ctx.fillStyle = '#0ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
            ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            requestAnimationFrame(dropperLoop);
        }

        function endDropper() {
            gameActive = false;
            document.getElementById('death-menu').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('ndHigh', highScore);
            }
        }

        // Simple Shop placeholders
        function toggleShop(s) { document.getElementById('shop-menu').classList.toggle('hidden', !s); }
        function toggleSkins(s) { document.getElementById('skins-menu').classList.toggle('hidden', !s); }
        
        // Initial setup
        resize();
        document.getElementById('high-score-display').innerText = "HIGH: " + highScore;
    </script>
</body>
</html>
