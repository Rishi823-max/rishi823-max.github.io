<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dev Portfolio | Game Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            touch-action: none; 
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 550px;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #1f2937;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fullscreen State via Class */
        .game-wrapper.fullscreen-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            border-radius: 0;
            border: none;
        }

        canvas { display: block; image-rendering: auto; }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            color: white;
        }

        .interactable { pointer-events: auto; }

        .tab-btn.active { background-color: #3b82f6; color: white; }

        .ctrl-hint {
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-tighter text-white flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                ARCADE.DEV
            </span>
            <div class="space-x-8 text-sm font-semibold hidden md:flex">
                <a href="#about" class="text-gray-400 hover:text-white transition-colors">Intro</a>
                <a href="#projects" class="text-gray-400 hover:text-white transition-colors">Games</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="about" class="pt-40 pb-10 px-6 max-w-6xl mx-auto text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tighter leading-none">
            Competitive <span class="text-blue-500">Playground.</span>
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto text-lg">
            High-performance browser games built with vanilla JavaScript.
        </p>
    </section>

    <!-- Games Section -->
    <section id="projects" class="py-10 px-6">
        <div class="max-w-5xl mx-auto">
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2 bg-black/40 p-1 rounded-2xl border border-white/5">
                    <button id="btnNeon" onclick="switchGame('neon')" class="tab-btn active px-6 py-2 rounded-xl text-sm font-bold transition-all">
                        Neon Survivor
                    </button>
                    <button id="btnRivals" onclick="switchGame('rivals')" class="tab-btn px-6 py-2 rounded-xl text-sm font-bold text-gray-500 hover:text-white transition-all">
                        Rivals 1v1
                    </button>
                </div>
                
                <div class="hidden md:flex gap-3 items-center">
                    <span class="ctrl-hint text-gray-400 font-mono">[ESC] Fullscreen Toggle</span>
                    <span class="ctrl-hint text-gray-400 font-mono">Arrows/WASD to Move</span>
                </div>
            </div>

            <div id="gameContainer" class="game-wrapper shadow-2xl shadow-blue-500/10">
                <canvas id="gameCanvas"></canvas>
                
                <div id="gameUI" class="ui-layer">
                    <!-- Start Screen -->
                    <div id="startOverlay" class="absolute inset-0 bg-black/90 backdrop-blur-md flex flex-col items-center justify-center interactable">
                        <div id="gameTitleText" class="text-5xl font-black mb-2 italic">NEON SURVIVOR</div>
                        <div class="flex gap-4 mb-8">
                            <span class="ctrl-hint text-blue-400">ARROWS TO MOVE</span>
                            <span class="ctrl-hint text-blue-400">ESC FOR FULLSCREEN</span>
                        </div>
                        <button onclick="initCurrentGame()" class="bg-blue-600 text-white px-12 py-4 rounded-full text-xl font-bold hover:bg-blue-500 transition-colors">
                            START MATCH
                        </button>
                    </div>

                    <!-- HUD -->
                    <div id="hud" class="hidden absolute inset-0">
                        <div class="flex justify-between p-6">
                            <div class="flex gap-4">
                                <div class="bg-black/60 px-5 py-2 rounded-xl border border-white/10 backdrop-blur">
                                    <div id="stat1Label" class="text-[10px] text-blue-400 font-bold uppercase">Points</div>
                                    <div id="stat1Val" class="text-xl font-black">0</div>
                                </div>
                                <div id="rivalScore" class="hidden bg-black/60 px-5 py-2 rounded-xl border border-white/10 backdrop-blur">
                                    <div class="text-[10px] text-red-400 font-bold uppercase">Enemy Score</div>
                                    <div id="aiWins" class="text-xl font-black text-center">0</div>
                                </div>
                            </div>
                            <div class="bg-black/60 px-5 py-2 rounded-xl border border-white/10 backdrop-blur text-right">
                                <div id="stat2Label" class="text-[10px] text-purple-400 font-bold uppercase">Status</div>
                                <div id="stat2Val" class="text-xl font-black">ACTIVE</div>
                            </div>
                        </div>

                        <!-- Footer Info -->
                        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-72 text-center">
                            <div class="h-2.5 bg-gray-800 rounded-full overflow-hidden border border-white/10 shadow-inner">
                                <div id="hpFill" class="h-full bg-gradient-to-r from-green-500 to-blue-400 transition-all duration-300" style="width: 100%"></div>
                            </div>
                            <div id="ammoBar" class="mt-4 flex gap-2 justify-center h-4"></div>
                        </div>
                    </div>
                </div>

                <div id="gameModal" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/95 p-10 rounded-3xl border border-white/10 interactable w-80 text-center">
                    <h2 id="modalTitle" class="text-2xl font-black mb-4">MATCH ENDED</h2>
                    <div id="modalContent" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        const uiStart = document.getElementById('startOverlay');
        const uiHud = document.getElementById('hud');
        const uiModal = document.getElementById('gameModal');
        const hpFill = document.getElementById('hpFill');
        const ammoBar = document.getElementById('ammoBar');
        
        let currentGame = 'neon';
        let gameActive = false;
        let keys = {};
        let frameCount = 0;

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // ESC key for Fullscreen Toggle
            if (e.code === 'Escape') {
                e.preventDefault();
                toggleFullscreen();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function toggleFullscreen() {
            container.classList.toggle('fullscreen-mode');
            // Small delay to allow CSS transition/reflow before canvas resize
            setTimeout(resize, 50);
        }

        function switchGame(type) {
            if(gameActive) location.reload();
            currentGame = type;
            document.getElementById('btnNeon').classList.toggle('active', type === 'neon');
            document.getElementById('btnRivals').classList.toggle('active', type === 'rivals');
            
            if(type === 'neon') {
                document.getElementById('gameTitleText').innerText = "NEON SURVIVOR";
                document.getElementById('rivalScore').classList.add('hidden');
            } else {
                document.getElementById('gameTitleText').innerText = "RIVALS 1v1";
                document.getElementById('rivalScore').classList.remove('hidden');
            }
        }

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GAME LOGIC ---
        let player, entities, projectiles, particles, score;

        function initCurrentGame() {
            uiStart.classList.add('hidden');
            uiHud.classList.remove('hidden');
            gameActive = true;
            score = 0;
            entities = []; projectiles = []; particles = [];

            if (currentGame === 'neon') {
                player = { x: canvas.width/2, y: canvas.height/2, hp: 100, speed: 4 };
                document.getElementById('stat1Label').innerText = "Kills";
                document.getElementById('stat2Label').innerText = "Mode: Survival";
            } else {
                player = { x: 100, y: canvas.height/2, hp: 100, speed: 5, ammo: 8, maxAmmo: 8, reloading: false, wins: 0 };
                entities.push({ type: 'ai', x: canvas.width - 100, y: canvas.height/2, hp: 100, speed: 3.5, wins: 0, lastShot: 0 });
                document.getElementById('stat1Label').innerText = "Player Score";
                document.getElementById('stat2Label').innerText = "Match Status";
                updateAmmoUI();
            }
            requestAnimationFrame(gameLoop);
        }

        function updateAmmoUI() {
            if (currentGame !== 'rivals') return;
            ammoBar.innerHTML = '';
            for(let i=0; i<player.maxAmmo; i++) {
                const dot = document.createElement('div');
                dot.className = `w-2.5 h-full rounded-full ${i < player.ammo ? 'bg-blue-400 shadow-[0_0_8px_rgba(59,130,246,0.6)]' : 'bg-gray-800'}`;
                ammoBar.appendChild(dot);
            }
        }

        function update() {
            let mx = 0, my = 0;
            // Arrow Keys + WASD Support
            if (keys['ArrowUp'] || keys['KeyW']) my -= 1;
            if (keys['ArrowDown'] || keys['KeyS']) my += 1;
            if (keys['ArrowLeft'] || keys['KeyA']) mx -= 1;
            if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
            
            if (mx !== 0 || my !== 0) {
                const angle = Math.atan2(my, mx);
                player.x += Math.cos(angle) * player.speed;
                player.y += Math.sin(angle) * player.speed;
            }

            // Screen boundaries
            player.x = Math.max(25, Math.min(canvas.width-25, player.x));
            player.y = Math.max(25, Math.min(canvas.height-25, player.y));

            if (currentGame === 'neon') {
                if (frameCount % 40 === 0) {
                    const side = Math.floor(Math.random()*4);
                    let ex, ey;
                    if(side === 0) { ex = Math.random()*canvas.width; ey = -30; }
                    else if(side === 1) { ex = canvas.width+30; ey = Math.random()*canvas.height; }
                    else if(side === 2) { ex = Math.random()*canvas.width; ey = canvas.height+30; }
                    else { ex = -30; ey = Math.random()*canvas.height; }
                    entities.push({ x: ex, y: ey, hp: 20, speed: 2 + (score/150) });
                }
                entities.forEach((e, idx) => {
                    const angle = Math.atan2(player.y-e.y, player.x-e.x);
                    e.x += Math.cos(angle) * e.speed;
                    e.y += Math.sin(angle) * e.speed;
                    if(Math.hypot(player.x-e.x, player.y-e.y) < 30) player.hp -= 0.8;
                });
                // Automatic turret fire in survival mode
                if (frameCount % 20 === 0 && entities.length > 0) {
                    let closest = entities[0], minD = 9999;
                    entities.forEach(e => {
                        const d = Math.hypot(player.x-e.x, player.y-e.y);
                        if(d < minD) { minD = d; closest = e; }
                    });
                    const a = Math.atan2(closest.y-player.y, closest.x-player.x);
                    projectiles.push({ x: player.x, y: player.y, vx: Math.cos(a)*12, vy: Math.sin(a)*12, owner: 'player' });
                }
                document.getElementById('stat1Val').innerText = score;
            } else {
                const ai = entities[0];
                ai.y += Math.sin(frameCount/15) * 5;
                if(Date.now() - ai.lastShot > 1000) {
                    const a = Math.atan2(player.y-ai.y, player.x-ai.x);
                    projectiles.push({ x: ai.x, y: ai.y, vx: Math.cos(a)*9, vy: Math.sin(a)*9, owner: 'ai' });
                    ai.lastShot = Date.now();
                }
                // Semi-auto firing logic for Rivals
                if (keys['Space'] && player.ammo > 0 && !player.reloading) {
                    projectiles.push({ x: player.x, y: player.y, vx: 15, vy: 0, owner: 'player' });
                    player.ammo--;
                    keys['Space'] = false; // Requires key release
                    updateAmmoUI();
                    if(player.ammo === 0) {
                        player.reloading = true;
                        document.getElementById('stat2Val').innerText = "RELOADING...";
                        setTimeout(() => { 
                            player.ammo = player.maxAmmo; 
                            player.reloading = false; 
                            updateAmmoUI(); 
                            document.getElementById('stat2Val').innerText = "ACTIVE";
                        }, 1000);
                    }
                }
                document.getElementById('stat1Val').innerText = player.wins;
                document.getElementById('aiWins').innerText = ai.wins;
            }

            // Projectile collisions
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i]; p.x += p.vx; p.y += p.vy;
                if (p.owner === 'player') {
                    if(currentGame === 'neon') {
                        entities.forEach((e, idx) => {
                            if(Math.hypot(p.x-e.x, p.y-e.y) < 25) {
                                e.hp -= 10; p.dead = true;
                                if(e.hp <= 0) { score++; entities.splice(idx, 1); }
                            }
                        });
                    } else {
                        const ai = entities[0];
                        if(Math.hypot(p.x-ai.x, p.y-ai.y) < 28) {
                            ai.hp -= 20; p.dead = true;
                            if(ai.hp <= 0) { player.wins++; ai.hp = 100; player.hp = 100; }
                        }
                    }
                } else if(p.owner === 'ai') {
                    if(Math.hypot(p.x-player.x, p.y-player.y) < 22) {
                        player.hp -= 25; p.dead = true;
                        if(player.hp <= 0) { entities[0].wins++; player.hp = 100; }
                    }
                }
                if(p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50 || p.dead) projectiles.splice(i, 1);
            }

            hpFill.style.width = player.hp + '%';
            if(player.hp <= 0) gameOver();
            frameCount++;
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            // Entities
            entities.forEach(e => {
                ctx.fillStyle = currentGame === 'rivals' ? '#f43f5e' : '#3b82f6';
                ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, Math.PI*2); ctx.fill();
            });

            // Projectiles
            projectiles.forEach(p => {
                ctx.fillStyle = p.owner === 'player' ? '#60a5fa' : '#ffffff';
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
            });

            // Player with glow
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
            ctx.beginPath(); ctx.arc(player.x, player.y, 18, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameActive = false;
            uiModal.classList.remove('hidden');
            document.getElementById('modalContent').innerHTML = `
                <p class="text-gray-400 mb-6">Score: ${score}</p>
                <button onclick="location.reload()" class="bg-blue-600 w-full p-4 rounded-2xl font-bold hover:bg-blue-500">PLAY AGAIN</button>
            `;
        }

        function gameLoop() {
            if (!gameActive) return;
            update(); draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
