<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .low-hp {
            animation: pulse-red 1.5s infinite;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay flex flex-col items-center p-4">
        <!-- XP Bar -->
        <div class="w-full max-w-2xl bg-gray-800 h-4 rounded-full overflow-hidden border border-gray-700 mt-2">
            <div id="xpFill" class="bg-blue-500 h-full transition-all duration-200" style="width: 0%"></div>
        </div>
        
        <!-- Stats -->
        <div class="flex justify-between w-full max-w-2xl mt-2 text-sm font-mono">
            <div id="levelDisplay">LVL: 1</div>
            <div id="timerDisplay">00:00</div>
            <div id="killDisplay">KILLS: 0</div>
        </div>

        <!-- Center Message (Level Up/Start/Game Over) -->
        <div id="modal" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-900/95 p-8 rounded-2xl border-2 border-blue-500 pointer-events-auto text-center w-80">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4">LEVEL UP!</h2>
            <div id="upgradeOptions" class="space-y-3">
                <!-- Buttons injected here -->
            </div>
        </div>

        <!-- Start Screen -->
        <div id="startScreen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center pointer-events-auto">
            <h1 class="text-6xl font-black text-blue-500 mb-2 italic">NEON SURVIVOR</h1>
            <p class="text-gray-400 mb-8">WASD to move • Auto-aiming weapons</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 px-12 py-4 rounded-full text-xl font-bold transition-all transform hover:scale-105">
                START MISSION
            </button>
        </div>

        <!-- Health Bar (Bottom) -->
        <div class="absolute bottom-8 flex flex-col items-center">
            <div id="healthContainer" class="w-64 bg-gray-800 h-3 rounded-full overflow-hidden border border-gray-700 mb-1">
                <div id="healthFill" class="bg-red-500 h-full transition-all duration-100" style="width: 100%"></div>
            </div>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Health</span>
        </div>
    </div>

    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const xpFill = document.getElementById('xpFill');
        const healthFill = document.getElementById('healthFill');
        const levelDisplay = document.getElementById('levelDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const killDisplay = document.getElementById('killDisplay');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const upgradeOptions = document.getElementById('upgradeOptions');
        const startScreen = document.getElementById('startScreen');

        // Game State
        let gameActive = false;
        let paused = false;
        let frameCount = 0;
        let startTime = 0;
        let kills = 0;
        let lastTime = 0;

        // Player Config
        const player = {
            x: 0,
            y: 0,
            radius: 12,
            speed: 3,
            hp: 100,
            maxHp: 100,
            level: 1,
            xp: 0,
            xpToNext: 10,
            weapons: [],
            direction: { x: 0, y: 0 }
        };

        const keys = {};
        const enemies = [];
        const projectiles = [];
        const particles = [];
        const gems = [];

        // Weapon Templates
        const WEAPON_TYPES = {
            MAGIC_WAND: {
                name: "Pulse Bolt",
                description: "Fires energy at nearest enemy",
                type: 'projectile',
                cooldown: 800,
                damage: 10,
                speed: 7,
                lastFire: 0
            },
            ORBITER: {
                name: "Neon Blade",
                description: "A blade that orbits you",
                type: 'orbit',
                damage: 5,
                count: 1,
                lastFire: 0
            },
            NOVA: {
                name: "Nova Blast",
                description: "Periodic blast in all directions",
                type: 'nova',
                cooldown: 2000,
                damage: 15,
                lastFire: 0
            }
        };

        // Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            startScreen.classList.add('hidden');
            gameActive = true;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.weapons = [{ ...WEAPON_TYPES.MAGIC_WAND, level: 1 }];
            startTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        function createParticle(x, y, color) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color
                });
            }
        }

        function spawnEnemy() {
            if (!gameActive || paused) return;
            
            const edge = Math.floor(Math.random() * 4);
            let x, y;
            const dist = 600;

            if (edge === 0) { x = player.x + (Math.random() - 0.5) * 1200; y = player.y - dist; }
            else if (edge === 1) { x = player.x + (Math.random() - 0.5) * 1200; y = player.y + dist; }
            else if (edge === 2) { x = player.x - dist; y = player.y + (Math.random() - 0.5) * 1200; }
            else { x = player.x + dist; y = player.y + (Math.random() - 0.5) * 1200; }

            const timeModifier = (Date.now() - startTime) / 60000; // Increase stats over time
            
            enemies.push({
                x, y,
                hp: 10 + (timeModifier * 15),
                speed: 1.2 + (Math.random() * 0.5),
                radius: 10 + Math.random() * 5,
                color: `hsl(${280 + Math.random() * 60}, 70%, 60%)`
            });
        }

        function getNearestEnemy() {
            let minDisp = Infinity;
            let nearest = null;
            enemies.forEach(e => {
                const d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < minDisp) {
                    minDisp = d;
                    nearest = e;
                }
            });
            return nearest;
        }

        function levelUp() {
            paused = true;
            modal.classList.remove('hidden');
            modalTitle.innerText = `LEVEL ${++player.level}`;
            upgradeOptions.innerHTML = '';

            // Randomly pick 3 upgrades
            const pool = Object.keys(WEAPON_TYPES);
            const choices = [];
            while(choices.length < 3) {
                const r = pool[Math.floor(Math.random() * pool.length)];
                if(!choices.includes(r)) choices.push(r);
            }

            choices.forEach(key => {
                const weapon = WEAPON_TYPES[key];
                const btn = document.createElement('button');
                btn.className = "w-full bg-gray-800 hover:bg-blue-900 border border-gray-700 p-3 rounded-lg text-left transition-colors pointer-events-auto";
                btn.innerHTML = `
                    <div class="font-bold text-blue-400">${weapon.name}</div>
                    <div class="text-xs text-gray-400">${weapon.description}</div>
                `;
                btn.onclick = () => {
                    const existing = player.weapons.find(w => w.name === weapon.name);
                    if (existing) {
                        existing.level++;
                        existing.damage *= 1.3;
                        if (existing.cooldown) existing.cooldown *= 0.9;
                        if (existing.count) existing.count++;
                    } else {
                        player.weapons.push({ ...weapon, level: 1 });
                    }
                    modal.classList.add('hidden');
                    paused = false;
                };
                upgradeOptions.appendChild(btn);
            });
        }

        function update(dt) {
            if (paused) return;

            // Player Movement
            let mx = 0, my = 0;
            if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) my += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) mx += 1;

            if (mx !== 0 || my !== 0) {
                const mag = Math.hypot(mx, my);
                player.x += (mx / mag) * player.speed;
                player.y += (my / mag) * player.speed;
                player.direction = { x: mx / mag, y: my / mag };
            }

            // Fire Weapons
            const now = Date.now();
            player.weapons.forEach(w => {
                if (w.type === 'projectile' && now - w.lastFire > w.cooldown) {
                    const target = getNearestEnemy();
                    if (target) {
                        const angle = Math.atan2(target.y - player.y, target.x - player.x);
                        projectiles.push({
                            x: player.x, y: player.y,
                            vx: Math.cos(angle) * w.speed,
                            vy: Math.sin(angle) * w.speed,
                            damage: w.damage,
                            radius: 5,
                            life: 200,
                            color: '#3b82f6'
                        });
                        w.lastFire = now;
                    }
                }
                if (w.type === 'nova' && now - w.lastFire > w.cooldown) {
                    for(let i=0; i<12; i++) {
                        const a = (i / 12) * Math.PI * 2;
                        projectiles.push({
                            x: player.x, y: player.y,
                            vx: Math.cos(a) * 5,
                            vy: Math.sin(a) * 5,
                            damage: w.damage,
                            radius: 6,
                            life: 60,
                            color: '#a855f7'
                        });
                    }
                    w.lastFire = now;
                }
            });

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                // Collision with enemies
                enemies.forEach(e => {
                    if (Math.hypot(p.x - e.x, p.y - e.y) < p.radius + e.radius) {
                        e.hp -= p.damage;
                        p.life = 0;
                        createParticle(p.x, p.y, p.color);
                    }
                });

                if (p.life <= 0) projectiles.splice(i, 1);
            }

            // Orbiting blades (drawn in loop, but logic here)
            const orbitWeapon = player.weapons.find(w => w.type === 'orbit');
            if (orbitWeapon) {
                const angle = (now / 500);
                const count = orbitWeapon.count;
                for(let i=0; i<count; i++) {
                    const offset = (i / count) * Math.PI * 2;
                    const ox = player.x + Math.cos(angle + offset) * 70;
                    const oy = player.y + Math.sin(angle + offset) * 70;
                    
                    enemies.forEach(e => {
                        if(Math.hypot(ox - e.x, oy - e.y) < 20 + e.radius) {
                            e.hp -= orbitWeapon.damage / 30; // Damage per frame
                            if(Math.random() > 0.9) createParticle(e.x, e.y, '#10b981');
                        }
                    });
                }
            }

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                // Hit Player
                if (Math.hypot(e.x - player.x, e.y - player.y) < e.radius + player.radius) {
                    player.hp -= 0.2;
                    if (player.hp <= 0) gameOver();
                }

                if (e.hp <= 0) {
                    kills++;
                    gems.push({ x: e.x, y: e.y, xp: 2 });
                    enemies.splice(i, 1);
                }
            }

            // Update Gems
            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                const dist = Math.hypot(g.x - player.x, g.y - player.y);
                if (dist < 100) {
                    const angle = Math.atan2(player.y - g.y, player.x - g.x);
                    g.x += Math.cos(angle) * 8;
                    g.y += Math.sin(angle) * 8;
                }
                if (dist < player.radius + 5) {
                    player.xp += g.xp;
                    if (player.xp >= player.xpToNext) {
                        player.xp -= player.xpToNext;
                        player.xpToNext *= 1.2;
                        levelUp();
                    }
                    gems.splice(i, 1);
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Spawn
            if (frameCount % 60 === 0) spawnEnemy();
            frameCount++;

            // UI Update
            xpFill.style.width = `${(player.xp / player.xpToNext) * 100}%`;
            healthFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
            levelDisplay.innerText = `LVL: ${player.level}`;
            killDisplay.innerText = `KILLS: ${kills}`;
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Camera follow (keep player centered)
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

            // Draw Grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            const gridSize = 100;
            const startX = Math.floor((player.x - canvas.width) / gridSize) * gridSize;
            const startY = Math.floor((player.y - canvas.height) / gridSize) * gridSize;
            for(let x = startX; x < player.x + canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, player.y - canvas.height); ctx.lineTo(x, player.y + canvas.height); ctx.stroke();
            }
            for(let y = startY; y < player.y + canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(player.x - canvas.width, y); ctx.lineTo(player.x + canvas.width, y); ctx.stroke();
            }

            // Gems
            gems.forEach(g => {
                ctx.fillStyle = '#3b82f6';
                ctx.shadowBlur = 10; ctx.shadowColor = '#3b82f6';
                ctx.beginPath();
                ctx.moveTo(g.x, g.y - 4);
                ctx.lineTo(g.x + 4, g.y);
                ctx.lineTo(g.x, g.y + 4);
                ctx.lineTo(g.x - 4, g.y);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.globalAlpha = 1;

            // Projectiles
            projectiles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8; ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fill();
                // Glow
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Orbiting blades
            const orbitWeapon = player.weapons.find(w => w.type === 'orbit');
            if (orbitWeapon) {
                const angle = (Date.now() / 500);
                const count = orbitWeapon.count;
                for(let i=0; i<count; i++) {
                    const offset = (i / count) * Math.PI * 2;
                    const ox = player.x + Math.cos(angle + offset) * 70;
                    const oy = player.y + Math.sin(angle + offset) * 70;
                    ctx.fillStyle = '#10b981';
                    ctx.shadowBlur = 15; ctx.shadowColor = '#10b981';
                    ctx.beginPath();
                    ctx.arc(ox, oy, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Player
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        function gameOver() {
            gameActive = false;
            modal.classList.remove('hidden');
            modalTitle.innerText = "MISSION FAILED";
            upgradeOptions.innerHTML = `
                <div class="text-gray-400 mb-4 font-mono">
                    Time: ${timerDisplay.innerText}<br>
                    Kills: ${kills}<br>
                    Level: ${player.level}
                </div>
                <button onclick="location.reload()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">RETRY</button>
            `;
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
