<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Parkour </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-text { font-family: 'Orbitron', sans-serif; color: #fff; }
        
        #admin-gui {
            position: absolute; right: 20px; top: 100px;
            background: rgba(0,0,0,0.9); border: 2px solid #00f2ff; padding: 15px;
            color: #00f2ff; display: none; pointer-events: auto; width: 220px;
            border-radius: 12px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }
        .gui-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 5px; }
        .status-on { color: #00ff00; text-shadow: 0 0 8px #00ff00; font-weight: bold; }
        .status-off { color: #ff0044; font-weight: bold; }

        #admin-console {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 450px; background: #0a0a0a; border: 2px solid #00f2ff;
            padding: 15px; pointer-events: auto; color: #00f2ff; display: none;
        }
        #admin-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; }
        
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .btn { background: #00f2ff; color: #000; padding: 15px 40px; cursor: pointer; font-weight: 900; border: none; border-radius: 4px; pointer-events: auto; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="hud" class="hidden">
            <div class="absolute top-6 left-6 hud-text">
                <div id="world-tag" class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold mb-1 uppercase">Loading District...</div>
                <div class="flex items-end gap-8">
                    <div><div class="text-[10px] opacity-50">DISTANCE</div><div id="dist" class="text-3xl font-black">0m</div></div>
                    <div><div class="text-[10px] opacity-50 text-yellow-400">CREDITS</div><div id="coin-count" class="text-3xl font-black text-yellow-400">0</div></div>
                </div>
            </div>
        </div>

        <div id="admin-gui">
            <div class="text-sm font-black mb-4 border-b-2 border-cyan-400 pb-2 tracking-widest text-center">ADMIN PRIVILEGES</div>
            <div class="gui-row"><span>GOD_MODE</span><span id="gui-god" class="status-off">OFF</span></div>
            <div class="gui-row"><span>FLIGHT_PRO</span><span id="gui-fly" class="status-off">OFF</span></div>
            <div class="gui-row"><span>DBL_JUMP</span><span id="gui-jump" class="status-off">OFF</span></div>
            <div class="gui-row"><span>WORLD_ID</span><span id="gui-world" class="text-white">1</span></div>
            <div class="text-[10px] text-center opacity-40 italic">System Overridden</div>
        </div>

        <div id="admin-console">
            <div class="text-[10px] opacity-50 mb-1">ENCRYPTED INPUT MODULE</div>
            <input type="text" id="admin-input" placeholder="Awaiting Input..." autocomplete="off">
        </div>

        <div id="menu" class="menu-overlay">
            <h1 class="text-7xl font-black text-white mb-2 italic hud-text tracking-tighter">NEON ELITE</h1>
            <p class="text-cyan-400 text-xs mb-10 tracking-[0.6em]">AUTHORIZED ACCESS ONLY</p>
            <button class="btn" onclick="startGame()">INITIALIZE</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const adminConsole = document.getElementById('admin-console');
const adminInput = document.getElementById('admin-input');
const adminGui = document.getElementById('admin-gui');

let state = 'MENU';
let player, platforms = [], obstacles = [], coins = [];
let camera = { x: 0, y: 0 };
let keys = {};
let isAdminUnlocked = false;
let auraTimer = 0;

const worlds = [
    { name: "NEON DISTRICT", color: "#00f2ff", bg: "#050505" },
    { name: "VOID SECTOR", color: "#ff00ff", bg: "#0a000a" },
    { name: "SOLAR FLARE", color: "#ffaa00", bg: "#0f0500" }
];

let progress = { coins: 0, hasJetpack: false, isGod: false, doubleJump: false, worldIndex: 0 };

class Player {
    constructor() { this.reset(); }
    reset() {
        this.x = 100; this.y = 400; this.vx = 0; this.vy = 0;
        this.w = 22; this.h = 48; this.grounded = false;
        this.sliding = false; this.rot = 0; this.jumpCount = 0;
    }

    update() {
        let moveX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
        this.vx += moveX * (this.grounded ? 1.3 : 0.8);
        this.vx *= 0.88;
        
        if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
            if (this.grounded && !keys.jumpPressed) {
                this.vy = -18; // ELITE JUMP HEIGHT
                this.grounded = false; this.jumpCount = 1; keys.jumpPressed = true;
            } else if (progress.doubleJump && this.jumpCount < 2 && !keys.jumpPressed) {
                this.vy = -15; this.jumpCount = 2; keys.jumpPressed = true;
            }
        }

        if (progress.hasJetpack && (keys['KeyW'] || keys['Space'])) { this.vy -= 1.0; this.rot += 0.35; } 
        else { this.vy += 0.75; }

        this.x += this.vx; this.y += this.vy;
        if (!this.grounded) this.rot += this.vx * 0.15; else this.rot = 0;
        
        if (keys['KeyS'] || keys['ArrowDown']) {
            if (!this.sliding) { this.sliding = true; this.h = 22; this.y += 26; }
        } else if (this.sliding) {
            this.h = 48; this.y -= 26; this.sliding = false;
        }

        this.grounded = false;
        platforms.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.vy > 0 && this.y + this.h > p.y && this.y + this.h < p.y + 15) {
                this.y = p.y - this.h; this.vy = 0; this.grounded = true; this.jumpCount = 0;
            }
        });

        if (!progress.isGod) {
            obstacles.forEach(o => {
                if (this.x < o.x + o.w - 5 && this.x + this.w > o.x + 5 && this.y < o.y + o.h - 5 && this.y + this.h > o.y + 5) die();
            });
            if (this.y > 1500) die();
        }

        if (this.x > platforms[platforms.length-1].x + 200) {
            progress.worldIndex = (progress.worldIndex + 1) % worlds.length;
            startGame();
        }

        coins.forEach(c => {
            if (!c.collected && this.x < c.x + 25 && this.x + this.w > c.x && this.y < c.y + 25 && this.y + this.h > c.y) {
                c.collected = true; progress.coins += 50; // MORE COINS
            }
        });

        document.getElementById('dist').innerText = Math.max(0, Math.floor((this.x - 100) / 10)) + "m";
    }

    draw() {
        if (progress.isGod) {
            auraTimer += 0.15;
            ctx.beginPath();
            ctx.strokeStyle = worlds[progress.worldIndex].color;
            ctx.lineWidth = 4;
            ctx.arc(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y, 40 + Math.sin(auraTimer)*10, 0, Math.PI*2);
            ctx.stroke();
            ctx.shadowBlur = 15; ctx.shadowColor = worlds[progress.worldIndex].color;
        }

        ctx.save();
        ctx.translate(this.x + this.w/2 - camera.x, this.y + this.h/2 - camera.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = "#fff";
        if (this.sliding) { ctx.fillRect(-16, -11, 32, 22); } 
        else {
            ctx.beginPath(); ctx.arc(0, -20, 7, 0, Math.PI*2); ctx.fill(); 
            ctx.fillRect(-2, -14, 4, 18); ctx.fillRect(-9, -12, 18, 4); 
            ctx.fillRect(-7, 4, 5, 14); ctx.fillRect(2, 4, 5, 14); 
        }
        ctx.restore();
        ctx.shadowBlur = 0;
    }
}

function updateGui() {
    document.getElementById('gui-god').innerText = progress.isGod ? "ON" : "OFF";
    document.getElementById('gui-god').className = progress.isGod ? "status-on" : "status-off";
    document.getElementById('gui-fly').innerText = progress.hasJetpack ? "ON" : "OFF";
    document.getElementById('gui-fly').className = progress.hasJetpack ? "status-on" : "status-off";
    document.getElementById('gui-jump').innerText = progress.doubleJump ? "ON" : "OFF";
    document.getElementById('gui-jump').className = progress.doubleJump ? "status-on" : "status-off";
    document.getElementById('gui-world').innerText = progress.worldIndex + 1;
    document.getElementById('world-tag').innerText = `WORLD ${progress.worldIndex + 1}: ${worlds[progress.worldIndex].name}`;
}

function adminCommand(input) {
    const raw = input.trim();
    const parts = raw.toLowerCase().split(' ');
    
    if (!isAdminUnlocked) {
        if (raw === "101165") { 
            isAdminUnlocked = true; 
            adminGui.style.display = "block"; 
            updateGui(); 
        }
    } else {
        if (parts[0] === "/god") progress.isGod = !progress.isGod;
        if (parts[0] === "/fly") progress.hasJetpack = !progress.hasJetpack;
        if (parts[0] === "/double" && parts[1] === "jump") progress.doubleJump = !progress.doubleJump;
        if (parts[0] === "/skip" && parts[1] === "level") { progress.worldIndex = (progress.worldIndex + 1) % worlds.length; startGame(); }
        if (parts[0] === "/give" && parts[1] === "coins") progress.coins += parseInt(parts[2]) || 1000;
        updateGui();
    }
    adminConsole.style.display = "none"; adminInput.value = "";
}

function generateLevel() {
    platforms = [{ x: 0, y: 500, w: 1200, h: 50 }];
    obstacles = []; coins = [];
    let lx = 1200;
    for (let i = 0; i < 45; i++) {
        let gap = 50 + Math.random() * 80; // Easier Gaps
        let pw = 300 + Math.random() * 400;
        let ny = 300 + Math.random() * 300;
        platforms.push({ x: lx + gap, y: ny, w: pw, h: 40 });
        
        if (i % 5 === 0) {
            if (Math.random() > 0.5) { // Easier Slide Laser
                obstacles.push({ x: lx + gap + 60, y: ny - 95, w: 110, h: 5 }); 
            } else { // Shorter Jump Pillar
                obstacles.push({ x: lx + gap + 150, y: ny - 180, w: 10, h: 180 });
            }
        }
        if (Math.random() > 0.4) coins.push({ x: lx + gap + 60, y: ny - 70, collected: false });
        lx += gap + pw;
    }
}

function startGame() {
    generateLevel();
    if (!player) player = new Player();
    player.reset(); state = 'PLAY';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    updateGui();
}

function die() { 
    state = 'MENU'; 
    document.getElementById('menu').classList.remove('hidden'); 
    document.getElementById('hud').classList.add('hidden');
}

function loop() {
    const curWorld = worlds[progress.worldIndex];
    ctx.fillStyle = curWorld.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (state === 'PLAY') {
        player.update();
        camera.x += (player.x - canvas.width/3 - camera.x) * 0.15;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.15;

        platforms.forEach(p => {
            ctx.fillStyle = curWorld.color; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 6);
            ctx.fillStyle = "rgba(255,255,255,0.02)"; ctx.fillRect(p.x - camera.x, p.y + 6 - camera.y, p.w, p.h);
        });
        obstacles.forEach(o => {
            ctx.fillStyle = "#ff0044"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff0044";
            ctx.fillRect(o.x - camera.x, o.y - camera.y, o.w, o.h);
            ctx.shadowBlur = 0;
        });
        coins.forEach(c => { 
            if (!c.collected) { 
                ctx.fillStyle = "#ffd700"; 
                ctx.shadowBlur = 10; ctx.shadowColor = "#ffd700";
                ctx.fillRect(c.x - camera.x, c.y - camera.y, 18, 18); 
                ctx.shadowBlur = 0;
            } 
        });
        player.draw();
        document.getElementById('coin-count').innerText = progress.coins;
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key === 'Shift') { adminConsole.style.display = "block"; adminInput.focus(); }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (['KeyW', 'Space', 'ArrowUp'].includes(e.code)) keys.jumpPressed = false;
});
adminInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminCommand(adminInput.value); });

canvas.width = window.innerWidth; canvas.height = window.innerHeight;
loop();
</script>
</body>
</html>
