<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCADE | Creative Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: #030303;
            color: #e5e7eb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 50%);
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 600px;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { display: block; image-rendering: auto; }

        .tab-btn { color: #9ca3af; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; }
        .tab-btn.active { background-color: #3b82f6; color: white; border-color: #60a5fa; }

        /* 2048 Styles */
        #game2048 {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
            background: #0a0a0a;
        }

        .grid-2048 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            background: #1f2937;
            padding: 12px;
            border-radius: 12px;
            width: 320px; height: 320px;
        }

        .tile {
            width: 65px; height: 65px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
            transition: transform 0.1s, background 0.1s;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #fff; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; color: #fff; font-size: 18px; }
        .tile-256 { background: #edcc61; color: #fff; font-size: 18px; }
        .tile-512 { background: #edc850; color: #fff; font-size: 18px; }
        .tile-1024 { background: #edc53f; color: #fff; font-size: 14px; }
        .tile-2048 { background: #3b82f6; color: #fff; font-size: 14px; box-shadow: 0 0 20px #3b82f6; }
    </style>
</head>
<body class="hero-gradient">

    <nav class="fixed top-0 w-full z-50 bg-black/50 backdrop-blur-xl border-b border-white/5 h-20 flex items-center justify-between px-10 text-white">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">A</div>
            <span class="text-xl font-extrabold">ARCADE</span>
        </div>
    </nav>

    <section id="projects" class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-wrap items-center justify-center gap-2 mb-8 bg-white/5 p-2 rounded-2xl border border-white/5 w-fit mx-auto">
                <button onclick="switchGame('dropper')" id="btnDropper" class="tab-btn active px-6 py-2 rounded-xl text-sm">Dropper</button>
                <button onclick="switchGame('neon')" id="btnNeon" class="tab-btn px-6 py-2 rounded-xl text-sm">Survivor</button>
                <button onclick="switchGame('rivals')" id="btnRivals" class="tab-btn px-6 py-2 rounded-xl text-sm">Rivals</button>
                <button onclick="switchGame('2048')" id="btn2048" class="tab-btn px-6 py-2 rounded-xl text-sm">2048</button>
            </div>

            <div id="gameContainer" class="game-wrapper shadow-2xl">
                <canvas id="gameCanvas"></canvas>
                <div id="game2048"><div class="grid-2048" id="grid2048"></div></div>
                
                <div id="gameUI" class="absolute inset-0 pointer-events-none flex items-center justify-center">
                    <div id="hud" class="hidden absolute top-0 w-full p-8 flex justify-between items-start text-white">
                        <div class="bg-black/80 px-5 py-3 rounded-xl border border-white/10 backdrop-blur-md">
                            <div id="stat1Label" class="text-[10px] text-blue-400 font-bold uppercase">Score</div>
                            <div id="stat1Val" class="text-2xl font-black font-mono">0</div>
                        </div>
                        <div id="rivalScoreBox" class="hidden bg-black/80 px-5 py-3 rounded-xl border border-white/10 backdrop-blur-md">
                            <div class="text-[10px] text-red-400 font-bold uppercase tracking-widest">Enemy</div>
                            <div id="statEnemyVal" class="text-2xl font-black font-mono">0</div>
                        </div>
                    </div>

                    <div id="start-menu" class="glass-card p-10 text-center pointer-events-auto max-w-sm w-full mx-6 border-blue-500/30">
                        <h1 id="menuTitle" class="text-3xl font-black mb-2 text-white uppercase">Neon Dropper</h1>
                        <p id="menuDesc" class="text-xs text-blue-400 font-bold mb-8 uppercase tracking-[0.3em]">Ultra-fast Descent</p>
                        <button class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white hover:scale-105 transition-all" onclick="initCurrentGame()">LAUNCH</button>
                    </div>

                    <div id="death-menu" class="hidden glass-card p-10 text-center pointer-events-auto max-w-sm w-full mx-6 border-red-500/30">
                        <h2 id="deathTitle" class="text-3xl font-black text-red-500 mb-2 uppercase tracking-tighter">TERMINATED</h2>
                        <p class="text-gray-400 mb-6 font-mono tracking-widest">RESULT: <span id="finalScore" class="text-white font-bold">0</span></p>
                        <button class="w-full bg-red-600 py-4 rounded-xl font-bold text-white transition-all transform hover:scale-105" onclick="initCurrentGame()">RETRY</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        const startMenu = document.getElementById('start-menu');
        const deathMenu = document.getElementById('death-menu');
        const hud = document.getElementById('hud');
        const deathTitle = document.getElementById('deathTitle');
        const grid2048 = document.getElementById('grid2048');

        let currentGame = 'dropper';
        let gameActive = false;
        let keys = {};
        let score = 0, enemyScore = 0;
        let player, entities = [], projectiles = [], frameCount = 0, cameraY = 0, speed = 0;
        let board2048 = [];

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (currentGame === '2048' && gameActive) {
                if (e.code === 'ArrowUp') move2048('up');
                if (e.code === 'ArrowDown') move2048('down');
                if (e.code === 'ArrowLeft') move2048('left');
                if (e.code === 'ArrowRight') move2048('right');
            }
            if (currentGame === 'dropper' && gameActive) player.dir *= -1;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function switchGame(type) {
            currentGame = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn'+type.charAt(0).toUpperCase()+type.slice(1)));
            startMenu.classList.remove('hidden');
            deathMenu.classList.add('hidden');
            hud.classList.add('hidden');
            gameActive = false;
            document.getElementById('game2048').style.display = (type === '2048') ? 'flex' : 'none';
            canvas.style.display = (type === '2048') ? 'none' : 'block';
            
            const titles = { dropper: "Neon Dropper", neon: "Neon Survivor", rivals: "Rivals 1v1", "2048": "2048 Puzzle" };
            document.getElementById('menuTitle').innerText = titles[type];
        }

        function initCurrentGame() {
            startMenu.classList.add('hidden');
            deathMenu.classList.add('hidden');
            hud.classList.remove('hidden');
            gameActive = true;
            score = 0; enemyScore = 0; frameCount = 0;
            entities = []; projectiles = [];
            document.getElementById('rivalScoreBox').classList.add('hidden');

            if (currentGame === 'dropper') {
                player = { x: canvas.width/2, y: 150, dir: 1 };
                speed = 3.5; cameraY = 0;
            } else if (currentGame === 'neon') {
                player = { x: canvas.width/2, y: canvas.height/2, speed: 4 };
            } else if (currentGame === 'rivals') {
                player = { x: 100, y: canvas.height/2 };
                entities.push({ x: canvas.width-100, y: canvas.height/2 });
                document.getElementById('rivalScoreBox').classList.remove('hidden');
            } else if (currentGame === '2048') {
                board2048 = Array(4).fill().map(() => Array(4).fill(0));
                addTile2048(); addTile2048(); render2048();
            }
            if (currentGame !== '2048') requestAnimationFrame(gameLoop);
        }

        // --- 2048 Logic ---
        function addTile2048() {
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(!board2048[r][c]) empty.push({r,c});
            if(empty.length) {
                let {r,c} = empty[Math.floor(Math.random()*empty.length)];
                board2048[r][c] = Math.random() > 0.1 ? 2 : 4;
            }
        }

        function render2048() {
            grid2048.innerHTML = '';
            board2048.forEach(row => row.forEach(val => {
                let div = document.createElement('div');
                div.className = `tile ${val ? 'tile-'+val : ''}`;
                div.innerText = val || '';
                grid2048.appendChild(div);
            }));
            document.getElementById('stat1Val').innerText = score;
        }

        function move2048(dir) {
            let oldBoard = JSON.stringify(board2048);
            const rotate = () => {
                let nb = Array(4).fill().map(() => Array(4).fill(0));
                for(let r=0; r<4; r++) for(let c=0; c<4; c++) nb[c][3-r] = board2048[r][c];
                board2048 = nb;
            };
            const slide = () => {
                for(let r=0; r<4; r++) {
                    let row = board2048[r].filter(v => v);
                    for(let i=0; i<row.length-1; i++) if(row[i] === row[i+1]) { row[i]*=2; score+=row[i]; row.splice(i+1,1); }
                    while(row.length < 4) row.push(0);
                    board2048[r] = row;
                }
            };
            if(dir==='right'){ rotate(); rotate(); slide(); rotate(); rotate(); }
            else if(dir==='left'){ slide(); }
            else if(dir==='up'){ rotate(); rotate(); rotate(); slide(); rotate(); }
            else if(dir==='down'){ rotate(); slide(); rotate(); rotate(); rotate(); }
            if(oldBoard !== JSON.stringify(board2048)) { addTile2048(); render2048(); checkGameOver2048(); }
        }

        function checkGameOver2048() {
            let canMove = false;
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                if(!board2048[r][c] || (r<3 && board2048[r][c]===board2048[r+1][c]) || (c<3 && board2048[r][c]===board2048[r][c+1])) canMove = true;
                if(board2048[r][c] === 2048) { endGame("YOU WIN"); return; }
            }
            if(!canMove) endGame("GAME OVER");
        }

        function endGame(msg = "TERMINATED") {
            gameActive = false;
            deathMenu.classList.remove('hidden');
            deathTitle.innerText = msg;
            deathTitle.style.color = msg.includes("WIN") ? "#3b82f6" : "#ef4444";
            document.getElementById('finalScore').innerText = score;
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            if(currentGame === 'dropper') {
                speed += 0.002; player.x += player.dir * (6 + speed/4); player.y += speed;
                cameraY = player.y - 150;
                if(player.x < 15 || player.x > canvas.width-15) endGame();
                if(entities.length < 5) entities.push({y: entities.length ? entities[entities.length-1].y+250 : 600, cx: 100+Math.random()*(canvas.width-200), gap: 140});
                entities.forEach((o,i) => {
                    if(Math.abs(player.y-o.y) < 15 && (player.x < o.cx-o.gap/2 || player.x > o.cx+o.gap/2)) endGame();
                    if(o.y < player.y-200) entities.splice(i,1);
                });
                score = Math.floor(player.y/10);
                ctx.save(); ctx.translate(0, -cameraY);
                ctx.fillStyle = '#ef4444'; entities.forEach(o => { ctx.fillRect(0, o.y-10, o.cx-o.gap/2, 20); ctx.fillRect(o.cx+o.gap/2, o.y-10, canvas.width, 20); });
                ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill(); ctx.restore();
            } 
            else if(currentGame === 'neon') {
                if(keys['ArrowUp']) player.y -= player.speed; if(keys['ArrowDown']) player.y += player.speed;
                if(keys['ArrowLeft']) player.x -= player.speed; if(keys['ArrowRight']) player.x += player.speed;
                if(frameCount % 60 === 0) entities.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height});
                entities.forEach((e,i) => {
                    let d = Math.hypot(e.x-player.x, e.y-player.y);
                    if(d < 20) endGame();
                    e.x += (player.x-e.x)*0.01; e.y += (player.y-e.y)*0.01;
                    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI*2); ctx.fill();
                });
                score = Math.floor(frameCount/10);
                ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();
            }
            else if(currentGame === 'rivals') {
                if(keys['ArrowUp']) player.y -= 6; if(keys['ArrowDown']) player.y += 6;
                let ai = entities[0]; ai.y += Math.sin(frameCount/15)*7;
                if(keys['Space'] && frameCount % 12 === 0) projectiles.push({x: player.x, y: player.y, vx: 12, owner: 'p'});
                if(frameCount % 45 === 0) projectiles.push({x: ai.x, y: ai.y, vx: -10, owner: 'e'});
                projectiles.forEach((p,i) => {
                    p.x += p.vx;
                    if(p.owner==='p' && Math.hypot(p.x-ai.x, p.y-ai.y) < 25) { score++; p.dead=true; }
                    if(p.owner==='e' && Math.hypot(p.x-player.x, p.y-player.y) < 20) { enemyScore++; p.dead=true; }
                });
                projectiles = projectiles.filter(p => !p.dead && p.x > 0 && p.x < canvas.width);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(ai.x, ai.y, 20, 0, Math.PI*2); ctx.fill();
                projectiles.forEach(p => { ctx.fillStyle = p.owner==='p'?'#3b82f6':'#fff'; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); });
                document.getElementById('statEnemyVal').innerText = enemyScore;
                if(score >= 100) endGame("VICTORY"); if(enemyScore >= 100) endGame("TERMINATED");
            }
            document.getElementById('stat1Val').innerText = score;
            frameCount++; requestAnimationFrame(gameLoop);
        }
        switchGame('dropper');
    </script>
</body>
</html>
