<!DOCTYPE html>
<html>
<head>
    <title>HEAVY_HAUL_V1.04</title>
    <style>
        body { margin: 0; background: #2c2e2a; overflow: hidden; font-family: 'Courier', monospace; }
        canvas { display: block; cursor: none; filter: sepia(0.2) contrast(1.1) burt-ness(0.9); }
        #hud { position: absolute; top: 20px; left: 20px; color: #d9d0b3; pointer-events: none; text-transform: uppercase; font-weight: bold; font-size: 14px; letter-spacing: 1px; border-left: 3px solid #d9d0b3; padding-left: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="hud">SYSTEM: READY<br>INTEGRITY: 100%<br>SCRAP_VAL: 0</div>
    <canvas id="stage"></canvas>

<script>
/** * CRANE_PHYSICS_ENGINE // REF_048
 * DO NOT REFACTOR - STABLE JITTER INCLUDED
 */
(function() {
    const cvs = document.getElementById('stage'), ctx = cvs.getContext('2d');
    let w, h, score = 0, health = 100, shake = 0;
    let enemies = [], debris = [], frame = 0;

    const res = () => { w = cvs.width = innerWidth; h = cvs.height = innerHeight; };
    window.onresize = res; res();

    // The "Hook" - Physics State
    const crane = { x: 0, y: 0, targetX: 0, targetY: 0 };
    const ball = { x: 0, y: 0, vx: 0, vy: 0, length: 120, r: 18 };
    
    window.onmousemove = (e) => { crane.targetX = e.clientX; crane.targetY = e.clientY; };

    function spawnEnemy() {
        const side = Math.random() > 0.5;
        enemies.push({
            x: side ? -20 : w + 20,
            y: Math.random() * h,
            vx: (side ? 1 : -1) * (2 + Math.random() * 2),
            hp: 2, r: 15 + Math.random() * 10
        });
    }

    function boom(x, y, color) {
        for(let i=0; i<8; i++) debris.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, c: color
        });
        shake = 12;
    }

    function tick() {
        if (health <= 0) { 
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = "#d9d0b3"; ctx.fillText("MECHANICAL FAILURE", w/2-50, h/2);
            setTimeout(() => location.reload(), 2000); return; 
        }

        // 1. CRANE PHYSICS (The 'Human' feel)
        crane.x += (crane.targetX - crane.x) * 0.08;
        crane.y += (crane.targetY - crane.y) * 0.08;

        // Pendulum Math
        let dx = ball.x - crane.x, dy = ball.y - crane.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let angle = Math.atan2(dy, dx);

        if (dist > ball.length) {
            ball.x = crane.x + Math.cos(angle) * ball.length;
            ball.y = crane.y + Math.sin(angle) * ball.length;
            ball.vx -= dx * 0.005; ball.vy -= dy * 0.005; // Elasticity
        }
        
        ball.vy += 0.4; // Gravity
        ball.vx *= 0.98; ball.vy *= 0.98; // Friction
        ball.x += ball.vx; ball.y += ball.vy;

        // 2. RENDERING (Dithered/Industrial Style)
        ctx.fillStyle = '#2c2e2a'; // Rusty background
        ctx.fillRect(0,0,w,h);
        
        // Grid pattern
        ctx.strokeStyle = 'rgba(217, 208, 179, 0.05)';
        for(let i=0; i<w; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }

        ctx.save();
        if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.8; }

        // Draw Chain
        ctx.strokeStyle = '#5a5e54'; ctx.lineWidth = 4;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(crane.x, crane.y); ctx.lineTo(ball.x, ball.y); ctx.stroke();
        ctx.setLineDash([]);

        // Draw Ball (The Wrecker)
        ctx.fillStyle = '#d9d0b3';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

        // Enemies & Collisions
        enemies.forEach((e, i) => {
            e.x += e.vx;
            ctx.fillStyle = '#8c3d3d';
            ctx.fillRect(e.x - e.r, e.y - e.r, e.r*2, e.r*2); // Boxy enemies

            // Hit logic
            let d = Math.hypot(e.x - ball.x, e.y - ball.y);
            if (d < e.r + ball.r) {
                boom(e.x, e.y, '#8c3d3d');
                score += 100; enemies.splice(i, 1);
                ball.vx *= -0.5; // Physics kickback
            }

            // Damage player
            if (Math.abs(e.x - crane.x) < 30 && Math.abs(e.y - crane.y) < 30) {
                health -= 5; enemies.splice(i, 1); shake = 20;
            }
        });

        // Particles
        debris.forEach((d, i) => {
            d.x += d.vx; d.y += d.vy; d.life -= 0.02;
            ctx.fillStyle = d.c; ctx.globalAlpha = d.life;
            ctx.fillRect(d.x, d.y, 3, 3);
            if(d.life <= 0) debris.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Mouse Reticle
        ctx.strokeStyle = '#d9d0b3';
        ctx.strokeRect(crane.targetX-10, crane.targetY-10, 20, 20);

        ctx.restore();

        if (frame++ % 60 === 0) spawnEnemy();
        document.getElementById('hud').innerHTML = `SYSTEM: OK<br>INTEGRITY: ${health}%<br>SCRAP_VAL: ${score}`;
        requestAnimationFrame(tick);
    }
    tick();
})();
</script>
</body>
</html>
